name: Atomic Container + Cloud Sweep (Real Execution)

# Runs container/IaaS/cloud ART atomics on ubuntu-latest with Docker available.
# Covers: T1609, T1610, T1611, T1612, T1613 (container) and cloud-adjacent techniques.
#
# After completion, download artifacts and run:
#   python scripts/import_gha_artifacts.py --artifacts-dir ~/Downloads/container-sweep-artifacts

on:
  workflow_dispatch:
    inputs:
      passes:
        description: "Number of passes (1-3)"
        required: false
        default: "3"
      techniques:
        description: "Override: specific comma-separated technique IDs"
        required: false
        default: ""

jobs:
  sweep:
    name: "Container/Cloud Pass ${{ matrix.pass }}"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      matrix:
        pass: [1, 2, 3]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      # ── Verify Docker is available ────────────────────────────────────────
      - name: Verify Docker
        run: |
          docker --version
          docker info
          echo "Docker available"

      # ── Pull a small base image for container technique targets ───────────
      - name: Pull container target images
        run: |
          docker pull alpine:latest || true
          docker pull ubuntu:22.04 || true
          docker pull busybox:latest || true
          echo "Container images ready"

      # ── Install PowerShell Core ───────────────────────────────────────────
      - name: Install PowerShell Core
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq powershell
          pwsh --version

      # ── Install Invoke-AtomicRedTeam module ───────────────────────────────
      - name: Install Invoke-AtomicRedTeam
        run: |
          pwsh -NonInteractive -ExecutionPolicy Bypass -Command "
            \$ErrorActionPreference = 'SilentlyContinue'
            IEX (IWR 'https://raw.githubusercontent.com/redcanaryco/invoke-atomicredteam/master/install-atomicredteam.ps1' -UseBasicParsing)
            Install-AtomicRedTeam -Force -noPayloads -InstallPath /opt/invoke-atomicredteam
            Write-Host 'Invoke-AtomicRedTeam installed'
          "

      # ── Clone ART atomics catalog ─────────────────────────────────────────
      - name: Clone atomic-red-team atomics
        run: |
          # Sparse checkout WITHOUT --filter=blob:none — lazy blob loading causes
          # Invoke-AtomicRedTeam to report "does not exist" for all technique YAMLs.
          git clone --depth=1 --sparse \
            https://github.com/redcanaryco/atomic-red-team.git /opt/atomic-red-team-src
          cd /opt/atomic-red-team-src
          git sparse-checkout set atomics
          ln -s /opt/atomic-red-team-src/atomics /opt/atomic-red-team-atomics
          echo "Atomics: $(ls /opt/atomic-red-team-atomics | wc -l) dirs"

      # ── Install prerequisites for container techniques ────────────────────
      - name: Install prerequisites
        run: |
          sudo apt-get install -y -qq \
            curl wget python3 python3-pip jq || true
          # kubectl for cloud/k8s techniques
          curl -sLO "https://dl.k8s.io/release/$(curl -sL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/ || true
          echo "Prerequisites installed"

      # ── Run container + cloud atomics ─────────────────────────────────────
      - name: Run container/cloud atomic sweep (pass ${{ matrix.pass }})
        env:
          SWEEP_TECHNIQUES: ${{ inputs.techniques }}
          INVOKE_MODULE: /opt/invoke-atomicredteam/invoke-atomicredteam/Invoke-AtomicRedTeam.psd1
          ATOMIC_ROOT: /opt/atomic-red-team-atomics
          # Container technique target configuration
          DOCKER_HOST: unix:///var/run/docker.sock
        run: |
          # Container techniques explicitly
          CONTAINER_TECHS="T1609,T1610,T1611,T1612,T1613,T1046,T1053.002,T1053.007,T1069.001,T1105,T1136.001,T1195.002,T1552.007"
          TECHS="${SWEEP_TECHNIQUES:-$CONTAINER_TECHS}"

          mkdir -p results/container-pass-${{ matrix.pass }}
          python3 scripts/run_linux_local_sweep.py \
            --output-dir results/container-pass-${{ matrix.pass }} \
            --pass-idx ${{ matrix.pass }} \
            --run-number ${{ github.run_number }} \
            --techniques "$TECHS" \
            --concurrency 2

      # ── Capture Docker state as evidence ─────────────────────────────────
      - name: Capture Docker state snapshot
        if: always()
        run: |
          OUT="results/container-pass-${{ matrix.pass }}"
          mkdir -p "$OUT"
          docker ps -a --format json > "$OUT/docker_ps.json" 2>/dev/null || echo '[]' > "$OUT/docker_ps.json"
          docker images --format json > "$OUT/docker_images.json" 2>/dev/null || echo '[]' > "$OUT/docker_images.json"
          docker network ls --format json > "$OUT/docker_networks.json" 2>/dev/null || echo '[]' > "$OUT/docker_networks.json"
          echo "Docker state captured"

      # ── Upload artifacts ──────────────────────────────────────────────────
      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: container-sweep-p${{ matrix.pass }}-r${{ github.run_number }}
          path: results/container-pass-${{ matrix.pass }}/
          retention-days: 30
          if-no-files-found: warn
