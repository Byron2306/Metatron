name: Contract Assurance

on:
  pull_request:
    paths:
      - "backend/routers/unified_agent.py"
      - "backend/routers/swarm.py"
      - "backend/routers/soar.py"
      - "backend/routers/enterprise.py"
      - "backend/soar_engine.py"
      - "backend/quarantine.py"
      - "backend/threat_response.py"
      - "backend/routers/response.py"
      - "backend/routers/agent_commands.py"
      - "backend/services/agent_deployment.py"
      - "backend/tests/test_unified_agent_*.py"
      - "backend/tests/test_unified_agent_rollout_durability.py"
      - "backend/tests/test_unified_agent_deployment_durability.py"
      - "backend/tests/test_unified_agent_command_durability.py"
      - "backend/tests/test_swarm_contract_invariants.py"
      - "backend/tests/test_swarm_command_durability.py"
      - "backend/tests/test_soar_transition_audit.py"
      - "backend/tests/test_quarantine_transition_audit.py"
      - "backend/tests/test_threat_response_durability.py"
      - "backend/tests/test_legacy_agent_command_durability.py"
      - "backend/tests/test_agent_deployment_task_durability.py"
      - "backend/tests/test_cspm_scan_durability.py"
      - "backend/tests/test_cspm_finding_durability.py"
      - "backend/tests/test_enterprise_contract_invariants.py"
      - ".github/workflows/contract-assurance.yml"
  push:
    branches: ["main", "Seraph-v8"]
    paths:
      - "backend/routers/unified_agent.py"
      - "backend/routers/swarm.py"
      - "backend/routers/soar.py"
      - "backend/routers/enterprise.py"
      - "backend/soar_engine.py"
      - "backend/quarantine.py"
      - "backend/threat_response.py"
      - "backend/routers/response.py"
      - "backend/routers/agent_commands.py"
      - "backend/services/agent_deployment.py"
      - "backend/tests/test_unified_agent_*.py"
      - "backend/tests/test_unified_agent_rollout_durability.py"
      - "backend/tests/test_unified_agent_deployment_durability.py"
      - "backend/tests/test_unified_agent_command_durability.py"
      - "backend/tests/test_swarm_contract_invariants.py"
      - "backend/tests/test_swarm_command_durability.py"
      - "backend/tests/test_soar_transition_audit.py"
      - "backend/tests/test_quarantine_transition_audit.py"
      - "backend/tests/test_threat_response_durability.py"
      - "backend/tests/test_legacy_agent_command_durability.py"
      - "backend/tests/test_agent_deployment_task_durability.py"
      - "backend/tests/test_cspm_scan_durability.py"
      - "backend/tests/test_cspm_finding_durability.py"
      - "backend/tests/test_enterprise_contract_invariants.py"
      - ".github/workflows/contract-assurance.yml"

jobs:
  edm-contract-invariants:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install minimal test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest fastapi pydantic starlette python-multipart httpx

      - name: Run EDM contract assurance suite
        run: |
          pytest -q \
            backend/tests/test_unified_agent_edm_validation.py \
            backend/tests/test_unified_agent_edm_endpoints.py \
            backend/tests/test_unified_agent_contract_invariants.py \
            backend/tests/test_unified_agent_rollout_durability.py \
            backend/tests/test_unified_agent_deployment_durability.py \
            backend/tests/test_unified_agent_command_durability.py \
            backend/tests/test_swarm_contract_invariants.py \
            backend/tests/test_swarm_command_durability.py \
            backend/tests/test_soar_transition_audit.py \
            backend/tests/test_quarantine_transition_audit.py \
            backend/tests/test_threat_response_durability.py \
            backend/tests/test_legacy_agent_command_durability.py \
            backend/tests/test_agent_deployment_task_durability.py \
            backend/tests/test_cspm_scan_durability.py \
            backend/tests/test_cspm_finding_durability.py \
            backend/tests/test_enterprise_contract_invariants.py
             backend/tests/test_identity_incident_durability.py
