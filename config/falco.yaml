# Falco Configuration for Seraph AI Defense
# ==========================================
# Minimal configuration for containerized deployment

# Rules files
rules_files:
  - /etc/falco/falco_rules.yaml
  - /etc/falco/falco_rules.local.yaml

# Output channels
json_output: true
json_include_output_property: true
json_include_tags_property: true

# Log settings
log_stderr: false
log_syslog: false
log_level: info

# Output configuration - write JSON alerts to file
file_output:
  enabled: true
  keep_alive: true
  filename: /var/log/falco/falco_alerts.json

# Metrics
metrics:
  enabled: false

# gRPC output (disabled)
grpc:
  enabled: false

# Driver settings
engine:
  kind: modern_ebpf

# Buffered outputs
buffered_outputs: false

# Container metadata
container_engines:
  docker:
    enabled: true

# Syscall settings
syscall_event_drops:
  actions:
    - log
    - alert
  rate: 0.03333
  max_burst: 10
