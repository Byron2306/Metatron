title: Modify Authentication via Pluggable Authentication Modules
id: 5a9x0y8z-6v1w-1x4y-5z8a-9w2v3x6y1z2a
status: experimental
description: Detects modification of PAM modules for authentication tampering
references:
  - https://attack.mitre.org/techniques/T1556/003/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: file_event
  product: linux
detection:
  selection:
    EventType: Create
    TargetFilename|contains:
      - '/lib/security'
      - 'pam_'
  condition: selection
falsepositives:
  - System updates
level: high
tags:
  - attack.credential_access
  - attack.t1556.003
