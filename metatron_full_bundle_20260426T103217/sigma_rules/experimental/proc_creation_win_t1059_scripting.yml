title: PowerShell Script Execution
id: 8z2w3x1y-9u4v-4w7x-8y1z-2v5u6w9x4y5z
status: experimental
description: Detects execution of PowerShell scripts
references:
  - https://attack.mitre.org/techniques/T1059/011/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\powershell.exe'
    CommandLine|contains:
      - '-File'
      - '.ps1'
  condition: selection
falsepositives:
  - Legitimate PowerShell scripting
  - System administration
level: low
tags:
  - attack.execution
  - attack.t1059.011