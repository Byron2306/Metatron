title: Visual Basic Script Execution
id: 6x0u1v9w-7s2t-2u5v-6w9x-0t3s4u7v2w3x
status: experimental
description: Detects execution of Visual Basic scripts
references:
  - https://attack.mitre.org/techniques/T1059/008/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '\cscript.exe'
      - '\wscript.exe'
    CommandLine|endswith:
      - '.vbs'
      - '.vbe'
  condition: selection
falsepositives:
  - Legitimate VBScript usage
  - Administrative scripts
level: low
tags:
  - attack.execution
  - attack.t1059.008
