title: Indicator Removal via Network Share Disconnect
id: 9k3h4i2j-0f5g-5h8i-9j2k-3g6f7h0i5j6k
status: experimental
description: Detects disconnection from network shares to remove indicators
references:
  - https://attack.mitre.org/techniques/T1070/009/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'net use /delete'
      - 'umount'
  condition: selection
falsepositives:
  - Legitimate network disconnection
level: low
tags:
  - attack.defense_evasion
  - attack.t1070.009