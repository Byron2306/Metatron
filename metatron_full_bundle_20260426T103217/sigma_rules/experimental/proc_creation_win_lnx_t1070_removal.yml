title: Indicator Removal via File Deletion
id: 8j2g3h1i-9e4f-4g7h-8i1j-2f5e6g9h4i5j
status: experimental
description: Detects deletion of log files and evidence
references:
  - https://attack.mitre.org/techniques/T1070/008/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains|all:
      - 'rm'
      - '/var/log'
  condition: selection
falsepositives:
  - Log rotation
  - System maintenance
level: medium
tags:
  - attack.defense_evasion
  - attack.t1070.008
