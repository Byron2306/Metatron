title: Indicator Removal via Clear Command History
id: 7i1f2g0h-8d3e-3f6g-7h0i-1e4d5f8g3h4i
status: experimental
description: Detects clearing of command history files
references:
  - https://attack.mitre.org/techniques/T1070/007/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'history -c'
      - 'rm ~/.bash_history'
      - 'unset HISTFILE'
  condition: selection
falsepositives:
  - System cleanup scripts
level: medium
tags:
  - attack.defense_evasion
  - attack.t1070.007
