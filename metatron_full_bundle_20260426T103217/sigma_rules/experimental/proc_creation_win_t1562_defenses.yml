title: Impair Defenses via Safe Mode Boot
id: 3o7l8m6n-4j9k-9l2m-3n6o-7k0j1l4m9n0o
status: experimental
description: Detects attempts to boot into Safe Mode to impair defenses
references:
  - https://attack.mitre.org/techniques/T1562/009/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains:
      - 'bcdedit /set {default} safeboot'
      - 'shutdown /r /o'
  condition: selection
falsepositives:
  - System troubleshooting
level: high
tags:
  - attack.defense_evasion
  - attack.t1562.009
