title: Signed Binary Proxy Execution via MSHTA
id: 3u7r8s6t-4p9q-9r2s-3t6u-7q0p1r4s9t0u
status: experimental
description: Detects use of MSHTA for proxy execution of malicious scripts
references:
  - https://attack.mitre.org/techniques/T1218/004/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\mshta.exe'
    CommandLine|contains:
      - 'http'
      - 'javascript:'
  condition: selection
falsepositives:
  - Legitimate HTML applications
level: medium
tags:
  - attack.defense_evasion
  - attack.t1218.004
