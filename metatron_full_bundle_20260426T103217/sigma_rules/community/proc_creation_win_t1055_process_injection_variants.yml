title: Process Injection - Thread Execution Hijacking via Suspend and SetContext
id: d4e5f6a7-b8c9-0123-defa-123456789012
status: experimental
description: |
    Detects patterns consistent with thread execution hijacking (T1055.003) using
    SuspendThread, SetThreadContext, and ResumeThread API sequences — commonly
    seen in Cobalt Strike, Metasploit, and custom loaders. While the API calls
    themselves require an EDR to monitor, this rule detects process creation from
    parent processes that have opened handles to other processes in unusual ways,
    and tools known to implement thread hijacking loaders.
references:
    - https://attack.mitre.org/techniques/T1055/003/
    - https://www.ired.team/offensive-security/code-injection-process-injection/injecting-to-remote-process-via-thread-hijacking
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1055.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_injector_tools:
        Image|endswith:
            - '\ThreadInjector.exe'
            - '\HijackThis.exe'
        CommandLine|contains: '--hijack'
    selection_suspicious_spawn:
        ParentImage|endswith:
            - '\notepad.exe'
            - '\calc.exe'
            - '\mspaint.exe'
            - '\wordpad.exe'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\rundll32.exe'
    condition: selection_injector_tools or selection_suspicious_spawn
falsepositives:
    - Debugging tools and reverse engineering environments
level: high
