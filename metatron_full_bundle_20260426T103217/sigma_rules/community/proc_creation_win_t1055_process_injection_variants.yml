title: Process Injection - VDSO Hijacking on Linux
id: f6a7b8c9-d0e1-2345-fabc-345678901234
status: experimental
description: |
    Detects attempts to hijack the Linux vDSO (virtual dynamic shared object) for
    process injection (T1055.014). The vDSO is a small shared library mapped by
    the kernel into every user process address space for fast syscall execution.
    Adversaries with sufficient privileges can overwrite vDSO mappings to redirect
    syscalls to malicious code. This requires ptrace access to target processes.
references:
    - https://attack.mitre.org/techniques/T1055/014/
    - https://xcellerator.github.io/posts/linux_rootkits_07/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1055.014
logsource:
    category: process_creation
    product: linux
detection:
    selection_ptrace_vdso:
        Image|endswith:
            - '/gdb'
            - '/strace'
        CommandLine|re: '(?i)(vdso|vsyscall|/proc/[0-9]+/mem)'
    selection_proc_mem_write:
        Image|contains: '/proc/'
        CommandLine|contains: '/mem'
    condition: 1 of selection_*
falsepositives:
    - Legitimate debugging with gdb/strace on servers
level: medium
