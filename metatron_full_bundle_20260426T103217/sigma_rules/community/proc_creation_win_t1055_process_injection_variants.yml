title: Process Injection - ListPlanting via Common Control ListView
id: a7b8c9d0-e1f2-3456-abcd-456789012345
status: experimental
description: |
    Detects ListPlanting (T1055.015), a process injection technique that abuses the
    Windows Common Controls ListView control's custom draw callback pointer. An
    attacker writes shellcode to a target process, then overwrites the callback pointer
    with its address and triggers a repaint to execute the shellcode — entirely within
    normal Win32 message passing, evading memory scanning heuristics.
references:
    - https://attack.mitre.org/techniques/T1055/015/
    - https://www.hexacorn.com/blog/2022/05/10/listplanting-a-new-code-injection-trick/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1055.015
logsource:
    category: ps_script
    product: windows
    definition: 'Requires PowerShell Script Block Logging'
detection:
    selection:
        ScriptBlockText|contains:
            - 'LVM_SETITEMCOUNT'
            - 'LVM_GETITEMCOUNT'
            - 'SendMessage'
        ScriptBlockText|contains:
            - 'VirtualAllocEx'
            - 'WriteProcessMemory'
    condition: all of selection_*
falsepositives:
    - Security research tools implementing PoC
level: high
