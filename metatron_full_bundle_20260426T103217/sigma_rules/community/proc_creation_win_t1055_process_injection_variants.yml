title: Process Injection - Extra Window Memory Injection via SetWindowLong
id: e5f6a7b8-c9d0-1234-efab-234567890123
status: experimental
description: |
    Detects Extra Window Memory (EWM) injection (T1055.011) where adversaries
    abuse the SetWindowLong / SetWindowLongPtr API to write shellcode into the
    EWM allocated for a GUI window handle. This technique allows code injection
    without WriteProcessMemory by abusing legitimate GUI memory management.
    Used in older malware families and still relevant as a stealth injection path.
references:
    - https://attack.mitre.org/techniques/T1055/011/
    - https://www.ired.team/offensive-security/code-injection-process-injection/extra-window-memory-injection
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1055.011
logsource:
    category: ps_script
    product: windows
    definition: 'Requires PowerShell Script Block Logging'
detection:
    selection:
        ScriptBlockText|contains:
            - 'SetWindowLong'
            - 'SetWindowLongPtr'
            - 'PostMessage'
        ScriptBlockText|contains:
            - 'VirtualAllocEx'
            - 'shellcode'
            - '[byte[]]'
    condition: all of selection_*
falsepositives:
    - Security research tools
level: high
