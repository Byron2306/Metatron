title: Suspicious Script Execution via Lua Interpreter
id: b2c3d4e5-f6a7-8901-bcde-f12345678901
status: experimental
description: |
    Detects the Lua interpreter executing scripts from suspicious filesystem locations.
    Lua (T1059.011) is embedded in many gaming engines and applications. Adversaries
    have leveraged Lua's small footprint and wide availability as a scripting backend
    to execute payloads. Netsupport RAT and several C2 frameworks support Lua-based
    payload execution. The interpreter is also commonly bundled with game cheating
    software used as delivery vectors.
references:
    - https://attack.mitre.org/techniques/T1059/011/
    - https://www.elastic.co/security-labs/luna-ransomware-attack-pattern
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.execution
    - attack.t1059.011
logsource:
    category: process_creation
    product: windows
detection:
    selection_lua:
        Image|endswith:
            - '\lua.exe'
            - '\lua54.exe'
            - '\lua53.exe'
            - '\lua52.exe'
            - '\lua51.exe'
            - '\luajit.exe'
    selection_suspicious:
        CommandLine|re: '(?i)(\\Temp\\|\\AppData\\|\\Downloads\\|\\Public\\|\\ProgramData\\)'
    condition: selection_lua and selection_suspicious
falsepositives:
    - Game modding and scripting environments
    - Legitimate embedded application scripting
level: low
