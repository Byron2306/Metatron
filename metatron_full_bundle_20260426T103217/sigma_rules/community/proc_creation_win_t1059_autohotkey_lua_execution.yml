title: Suspicious Script Execution via AutoHotKey
id: a1b2c3d4-e5f6-7890-abcd-ef1234567890
status: experimental
description: |
    Detects AutoHotKey (AHK) script execution from suspicious locations or with
    unusual parent processes. AutoHotKey is a legitimate scripting language used
    for automation, but adversaries (T1059.010) use it to execute arbitrary code
    because AHK scripts are text files that run via the AHK interpreter — not a
    compiled executable — making them less likely to trigger AV alerts. AHK has
    been used in RAT delivery, keylogging, and persistence mechanisms.
references:
    - https://attack.mitre.org/techniques/T1059/010/
    - https://www.fortinet.com/blog/threat-research/latest-remcos-rat-phishing
    - https://any.run/malware-trends/autohotkey
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.execution
    - attack.t1059.010
logsource:
    category: process_creation
    product: windows
detection:
    selection_ahk:
        Image|endswith:
            - '\AutoHotkey.exe'
            - '\AutoHotkey32.exe'
            - '\AutoHotkey64.exe'
            - '\AutoHotkeyU32.exe'
            - '\AutoHotkeyU64.exe'
    selection_suspicious_location:
        CommandLine|re: '(?i)(\\AppData\\|\\Temp\\|\\Downloads\\|\\Users\\Public\\|\\ProgramData\\)'
    filter_legit:
        CurrentDirectory|contains: '\AutoHotkey'
    condition: selection_ahk and selection_suspicious_location and not filter_legit
falsepositives:
    - Legitimate AHK automation scripts run by users from their profile directories
level: medium
