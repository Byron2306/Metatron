title: Suspicious Script Execution via Network Device CLI Scripting
id: c3d4e5f6-a7b8-9012-cdef-012345678901
status: experimental
description: |
    Detects command interpreters or expect-like scripting tools that can be used
    to automate interaction with network device CLIs (T1059.008). Adversaries use
    tools like expect, plink, SecureCRT scripts, or Python paramiko to automate
    commands on routers, switches, and firewalls — enabling configuration changes,
    credential harvesting, or persistence on network infrastructure.
references:
    - https://attack.mitre.org/techniques/T1059/008/
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-335a
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.execution
    - attack.t1059.008
logsource:
    category: process_creation
    product: linux
detection:
    selection_expect:
        Image|endswith:
            - '/expect'
            - '/autoexpect'
        CommandLine|re: '(?i)(telnet|ssh|cisco|junos|enable|conf t|interface)'
    selection_plink:
        Image|endswith: '/plink'
        CommandLine|contains:
            - '-batch'
            - '-m '
            - '-pw '
    selection_paramiko:
        Image|endswith:
            - '/python'
            - '/python3'
        CommandLine|contains: 'paramiko'
    condition: 1 of selection_*
falsepositives:
    - Network automation engineers using Ansible, Netmiko, NAPALM
    - Legitimate NOC automation scripts
level: low
