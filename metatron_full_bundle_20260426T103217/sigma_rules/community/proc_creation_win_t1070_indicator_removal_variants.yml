title: Indicator Removal - USN Journal Deletion or Corruption
id: f2a3b4c5-d6e7-8901-fabe-901234567890
status: experimental
description: |
    Detects deletion or manipulation of the NTFS USN Journal, which records all
    file system changes. Adversaries use T1070.009 to destroy forensic evidence
    of file operations — malware drops, lateral movement tools, and staging.
    Fsutil.exe is the standard tool; PowerShell and direct DeviceIoControl calls
    are also used. Deleting the USN journal is rare in legitimate operations.
references:
    - https://attack.mitre.org/techniques/T1070/009/
    - https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/fsutil-usn
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1070.009
logsource:
    category: process_creation
    product: windows
detection:
    selection_fsutil_usn:
        Image|endswith: '\fsutil.exe'
        CommandLine|contains:
            - 'usn'
            - 'deletejournal'
    selection_wevtutil_clear:
        Image|endswith: '\wevtutil.exe'
        CommandLine|re: '(?i)(cl |clear-log )'
    condition: 1 of selection_*
falsepositives:
    - Windows Server administrators performing disk maintenance (rare)
level: high
