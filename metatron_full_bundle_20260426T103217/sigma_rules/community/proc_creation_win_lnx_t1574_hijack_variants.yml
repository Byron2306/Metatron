title: Hijack Execution Flow - Path Interception via Unquoted Service Path
id: e9f0a1b2-c3d4-5678-efab-678901234567
status: experimental
description: |
    Detects creation of executables in directories that can intercept unquoted
    Windows service paths (T1574.009). When a service path contains spaces and
    is not quoted, Windows searches each path component for an executable.
    "C:\Program Files\My App\service.exe" → Windows checks C:\Program.exe first.
    Adversaries place malicious binaries at these intercept points for persistence.
references:
    - https://attack.mitre.org/techniques/T1574/009/
    - https://medium.com/@SumitVerma101/windows-privilege-escalation-part-1-unquoted-service-path-c7a011a8d8ae
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.persistence
    - attack.t1574.009
logsource:
    category: file_event
    product: windows
detection:
    selection_intercept_path:
        TargetFilename|re: '(?i)^C:\\(Program|Windows)\.exe$|^C:\\Program Files\.exe$|^C:\\Program Files \(x86\)\.exe$'
    condition: selection_intercept_path
falsepositives:
    - Obscure legitimate software installed at root of C drive (extremely rare)
level: critical
