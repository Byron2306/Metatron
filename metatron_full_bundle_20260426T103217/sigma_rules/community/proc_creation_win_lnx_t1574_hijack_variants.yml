title: Hijack Execution Flow - Dynamic Linker Hijacking via LD_PRELOAD on Linux
id: d8e9f0a1-b2c3-4567-defa-567890123456
status: experimental
description: |
    Detects LD_PRELOAD or LD_LIBRARY_PATH manipulation to hijack shared library
    loading (T1574.006 / T1574.009). On Linux, these environment variables cause
    the dynamic linker to load attacker-specified libraries before system libraries,
    intercepting function calls. Used for credential harvesting (e.g., intercepting
    PAM auth), rootkit functionality, and sandbox evasion.
references:
    - https://attack.mitre.org/techniques/T1574/006/
    - https://attack.mitre.org/techniques/T1574/009/
    - https://www.anomali.com/blog/linux-threat-hunting-ld_preload
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.persistence
    - attack.t1574.006
    - attack.t1574.009
logsource:
    category: process_creation
    product: linux
detection:
    selection_env_preload:
        CommandLine|contains:
            - 'LD_PRELOAD='
            - 'LD_LIBRARY_PATH='
        CommandLine|re: '(?i)(LD_PRELOAD|LD_LIBRARY_PATH)=(/tmp/|/dev/shm/|/var/tmp/|\.so)'
    selection_etc_preload:
        TargetFilename:
            - '/etc/ld.so.preload'
    condition: selection_env_preload
falsepositives:
    - Developers using LD_PRELOAD for legitimate library override during testing
    - Valgrind, ASan, and other memory debugging tools
level: high
