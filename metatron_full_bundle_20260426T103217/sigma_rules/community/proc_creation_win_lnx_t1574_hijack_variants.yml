title: Hijack Execution Flow - KernelCallbackTable Manipulation
id: c7d8e9f0-a1b2-3456-cdef-456789012345
status: experimental
description: |
    Detects indicators of KernelCallbackTable (KCT) hijacking (T1574.013), a process
    injection technique where the PEB's KernelCallbackTable pointer is overwritten to
    redirect GUI callback execution to shellcode. Used in sophisticated implants to
    execute code within target processes without common injection APIs. Detected via
    unusual memory write patterns to the PEB region of GUI processes.
references:
    - https://attack.mitre.org/techniques/T1574/013/
    - https://www.ired.team/offensive-security/code-injection-process-injection/kernelcallbacktable-shellcode-injection
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.privilege_escalation
    - attack.t1574.013
logsource:
    category: ps_script
    product: windows
    definition: 'Requires PowerShell Script Block Logging'
detection:
    selection:
        ScriptBlockText|contains:
            - 'KernelCallbackTable'
            - 'NtQueryInformationProcess'
            - 'WriteProcessMemory'
        ScriptBlockText|contains:
            - 'PEB'
            - 'ProcessBasicInformation'
    condition: all of selection_*
falsepositives:
    - Security research and malware analysis tools
level: critical
