title: Fileless Storage - Process Executed Directly from Shared Memory
id: ec0f2eb4-7939-48d0-a774-9fc749603c1f
status: experimental
description: |
    Detects processes whose executable image path is within Linux shared memory
    directories. This is the execution phase of T1027.011 — after writing a payload
    to /dev/shm (no disk write), the adversary executes it directly from that path.
    This is used in IoT/Linux server attacks including Frog4Shell, 8220 gang, and
    Muhstik cryptominer campaigns.
references:
    - https://attack.mitre.org/techniques/T1027/011/
    - https://www.elastic.co/security-labs/elastic-identifies-new-espionage-campaign-using-binary-executed-from-shared-memory
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.execution
    - attack.t1027.011
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        Image|startswith:
            - '/dev/shm/'
            - '/run/shm/'
            - '/var/run/'
    filter_legit:
        Image|contains:
            - '/var/run/NetworkManager/'
            - '/var/run/systemd/'
            - '/var/run/containerd/'
    condition: selection and not filter_legit
falsepositives:
    - None expected for /dev/shm execution
level: critical
