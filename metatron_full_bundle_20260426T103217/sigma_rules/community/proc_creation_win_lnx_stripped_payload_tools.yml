title: Stripped Payload - Windows Binary Symbol Stripping via Build Tools
id: 9ea121f4-379c-4e95-888f-58909e0b391a
status: experimental
description: |
    Detects Windows build tool invocations that strip debug symbols and metadata from
    PE binaries. Adversaries compile or post-process malware to remove PDB paths,
    rich headers, and compiler metadata to evade tooling that identifies malware
    families by these artifacts.
references:
    - https://attack.mitre.org/techniques/T1027/008/
    - https://www.mandiant.com/resources/blog/golang-cybercrime
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1027.008
logsource:
    category: process_creation
    product: windows
detection:
    selection_strip:
        Image|endswith:
            - '\strip.exe'
            - '\sstrip.exe'
            - '\upx.exe'
        CommandLine|contains:
            - '--strip-all'
            - '--strip-debug'
            - '--best'
            - '-9'
    selection_go_ldflags:
        Image|endswith: '\go.exe'
        CommandLine|contains:
            - '-ldflags'
        CommandLine|re: '-ldflags[= ]["\s]*-[sw]'
    selection_pe_tools:
        Image|endswith:
            - '\pe-bear.exe'
            - '\pebear.exe'
            - '\CFF Explorer.exe'
        CommandLine|contains:
            - '--strip'
            - '-strip'
    condition: selection_strip or selection_go_ldflags or selection_pe_tools
falsepositives:
    - Legitimate Go application release builds
    - Security researchers analyzing binaries
level: low
