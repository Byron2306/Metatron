# Anti-AI Defense System - Docker Compose Setup
# =============================================
# Complete deployment with all services
#
# Usage:
#   docker-compose up -d
#
# Services:
#   - backend: FastAPI server
#   - frontend: React app
#   - mongodb: Database
#   - wireguard: VPN server
#
# Requirements:
#   - Docker & Docker Compose
#   - Linux kernel with WireGuard support (5.6+)
#   - NET_ADMIN capability for VPN

version: '3.8'

services:
  # ==========================================================================
  # MongoDB Database
  # ==========================================================================
  mongodb:
    image: mongo:7.0
    container_name: anti-ai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: anti_ai_defense
    networks:
      - anti-ai-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================================================
  # Backend API Server
  # ==========================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: anti-ai-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=anti_ai_defense
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - VPN_SERVER_ENDPOINT=${VPN_SERVER_ENDPOINT:-vpn.yourdomain.com}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME:-}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-}
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - vpn_config:/var/lib/anti-ai-defense/vpn
      - agent_scripts:/app/scripts
      - playbooks:/app/playbooks
    networks:
      - anti-ai-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================================================
  # Frontend React App
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-http://localhost:8001}
    container_name: anti-ai-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - anti-ai-network

  # ==========================================================================
  # WireGuard VPN Server
  # ==========================================================================
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: anti-ai-wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=${VPN_SERVER_ENDPOINT:-vpn.yourdomain.com}
      - SERVERPORT=51820
      - PEERS=${VPN_PEERS:-5}
      - PEERDNS=1.1.1.1,8.8.8.8
      - INTERNAL_SUBNET=10.200.200.0/24
      - ALLOWEDIPS=0.0.0.0/0
    volumes:
      - wireguard_config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
      - net.ipv4.ip_forward=1
    networks:
      - anti-ai-network

  # ==========================================================================
  # Nginx Reverse Proxy (Optional - for production)
  # ==========================================================================
  # nginx:
  #   image: nginx:alpine
  #   container_name: anti-ai-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./nginx/ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - backend
  #     - frontend
  #   networks:
  #     - anti-ai-network

networks:
  anti-ai-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  vpn_config:
    driver: local
  agent_scripts:
    driver: local
  playbooks:
    driver: local
  wireguard_config:
    driver: local
