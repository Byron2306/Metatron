# Seraph AI Defense System - Docker Compose Setup
# ================================================
# Complete deployment with all services
#
# Quick Start:
#   1. cp .env.example .env && nano .env
#   2. docker-compose up -d
#   3. Access UI at http://localhost:3000
#
# Services:
#   - backend: FastAPI server (port 8001)
#   - frontend: React app (port 3000)
#   - mongodb: Database (port 27017)
#   - wireguard: VPN server (port 51820/udp)
#
# Requirements:
#   - Docker 20.10+ & Docker Compose 2.0+
#   - Linux kernel with WireGuard support (5.6+)
#   - NET_ADMIN capability for VPN
#   - 4GB+ RAM recommended

services:
  # ==========================================================================
  # MongoDB Database
  # ==========================================================================
  mongodb:
    image: mongo:7.0
    container_name: seraph-mongodb
    restart: unless-stopped
    ports:
      - "${BIND_MONGODB_HOST:-127.0.0.1}:27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      MONGO_INITDB_DATABASE: seraph_ai_defense
    networks:
      seraph-network:
        aliases:
          - mongo
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 60s

  # ==========================================================================
  # Redis (Celery broker / result backend)
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: seraph-redis
    restart: unless-stopped
    ports:
      - "${BIND_REDIS_HOST:-127.0.0.1}:6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    networks:
      - seraph-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s


    # ==========================================================================
    # Frontend React App
    # ==========================================================================
  # ==========================================================================
  # Backend API Server
  # ==========================================================================
  backend:
    container_name: metatron-seraph-v9-backend-1
    init: true                    # ensure zombie processes are reaped
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    ports:
      - "${BIND_BACKEND_HOST:-127.0.0.1}:8001:8001"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}   # set to debug for troubleshooting crashes
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=seraph_ai_defense
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - REMOTE_ADMIN_ONLY=${REMOTE_ADMIN_ONLY:-true}
      - REMOTE_ADMIN_EMAILS=${REMOTE_ADMIN_EMAILS:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://165.22.41.184,http://165.22.41.184:3000,http://localhost:3000}
      - VPN_SERVER_ENDPOINT=${VPN_SERVER_ENDPOINT:-vpn.yourdomain.com}
      - ELASTICSEARCH_URL=${ELASTICSEARCH_URL:-http://elasticsearch:9200}
      - ELASTICSEARCH_USERNAME=${ELASTICSEARCH_USERNAME:-}
      - ELASTICSEARCH_PASSWORD=${ELASTICSEARCH_PASSWORD:-}
      - ELASTICSEARCH_API_KEY=${ELASTICSEARCH_API_KEY:-}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-mistral}
      - OLLAMA_URL=${OLLAMA_URL:-http://host.docker.internal:11434}
      - LOCAL_LLM_ENABLED=${LOCAL_LLM_ENABLED:-true}
      - CUCKOO_API_URL=${CUCKOO_API_URL:-http://cuckoo:1337}
      - CUCKOO_API_TOKEN=${CUCKOO_API_TOKEN:-}
      - CUCKOO_API_VERSION=${CUCKOO_API_VERSION:-2}
      - TRIVY_ENABLED=${TRIVY_ENABLED:-true}
      - TRIVY_SERVER=${TRIVY_SERVER:-trivy:4954}
      - FALCO_ENABLED=${FALCO_ENABLED:-true}
      - FLEET_BASE_URL=${FLEET_BASE_URL:-}
      - FLEET_API_TOKEN=${FLEET_API_TOKEN:-}
      - OSQUERY_RESULTS_LOG=${OSQUERY_RESULTS_LOG:-/var/log/osquery/osqueryd.results.log}
      - ATOMIC_VALIDATION_ENABLED=${ATOMIC_VALIDATION_ENABLED:-true}
      - ATOMIC_RED_TEAM_PATH=${ATOMIC_RED_TEAM_PATH:-/opt/atomic-red-team}
      - ATOMIC_VALIDATION_RESULTS_DIR=${ATOMIC_VALIDATION_RESULTS_DIR:-/var/lib/seraph-ai/atomic-validation}
      - ATOMIC_RUNNER=${ATOMIC_RUNNER:-pwsh}
      - KIBANA_URL=${KIBANA_URL:-http://kibana:5601}
      - VPN_ENABLED=${VPN_ENABLED:-true}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - INTEGRATION_API_KEY=${INTEGRATION_API_KEY:-}
    networks:
      seraph-network:
        aliases:
          - seraph-backend
          - backend
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
      ollama:
        condition: service_started
    volumes:
      - vpn_config:/var/lib/anti-ai-defense/vpn
      - ./scripts:/app/scripts:ro
      - ./backend/playbooks:/app/playbooks:ro
      - ./unified_agent:/app/unified_agent:ro
      - falco_data:/var/log/falco:ro
      - suricata_logs:/var/log/suricata:ro
      - zeek_logs:/var/log/zeek:ro
      - osquery_logs:/var/log/osquery:ro
      - atomic_validation_reports:/var/lib/seraph-ai/atomic-validation
      - ./atomic-red-team:/opt/atomic-red-team:ro
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  # ==========================================================================
  # Celery Worker
  # ==========================================================================
  celery-worker:
    container_name: seraph-celery-worker
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.celery_app.celery_app worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
    restart: unless-stopped
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=seraph_ai_defense
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - INTEGRATION_API_KEY=${INTEGRATION_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - seraph-network
    volumes:
      - ./backend/playbooks:/app/playbooks:ro
      - ./unified_agent:/app/unified_agent:ro
      - atomic_validation_reports:/var/lib/seraph-ai/atomic-validation
      - ./atomic-red-team:/opt/atomic-red-team:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # Celery Beat Scheduler
  # ==========================================================================
  celery-beat:
    container_name: seraph-celery-beat
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.celery_app.celery_app beat --loglevel=info
    restart: unless-stopped
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=seraph_ai_defense
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - CELERY_BROKER_URL=${CELERY_BROKER_URL:-redis://redis:6379/0}
      - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND:-redis://redis:6379/0}
      - INTEGRATION_API_KEY=${INTEGRATION_API_KEY:-}
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - seraph-network
    volumes:
      - ./backend/playbooks:/app/playbooks:ro
      - ./unified_agent:/app/unified_agent:ro
      - atomic_validation_reports:/var/lib/seraph-ai/atomic-validation
      - ./atomic-red-team:/opt/atomic-red-team:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:8001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ==========================================================================
  # Elasticsearch (local SIEM store)
  # ==========================================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: seraph-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - seraph-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9200/_cluster/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ==========================================================================
  # Kibana (local dashboards)
  # ==========================================================================
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: seraph-kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - seraph-network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5601/api/status"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 45s

  # ==========================================================================
  # Ollama (local LLM)
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: seraph-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - seraph-network
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 8
      start_period: 30s

  ollama-pull:
    image: ollama/ollama:latest
    container_name: seraph-ollama-pull
    restart: "no"
    depends_on:
      ollama:
        condition: service_started
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull ${OLLAMA_MODEL:-mistral} || true"]
    networks:
      - seraph-network
    profiles:
      - bootstrap

  # ==========================================================================
  # Trivy Server (optional remote scanner service)
  # ==========================================================================
  # Volatility 3 Memory Forensics Service (lightweight, used by backend)
  # This is a small helper container that provides the `vol`/`volatility3` tooling
  # without requiring a full backend image rebuild. It stays running so other
  # services can call it (e.g., via docker exec or networked RPC in future).
  volatility:
    build:
      context: ./tools/volatility
      dockerfile: Dockerfile
    container_name: seraph-volatility
    restart: unless-stopped
    volumes:
      - ./memory:/var/lib/seraph-ai/forensics
    networks:
      - seraph-network
    healthcheck:
      test: ["CMD", "python", "-c", "import subprocess,sys; rc=subprocess.run(['vol','-h'], capture_output=True).returncode; sys.exit(rc)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s
    profiles:
      - security

  # One-shot bootstrapper to create an initial admin account when none exists.
  # Safe to run repeatedly: /auth/setup returns 409 if an admin already exists.
  admin-bootstrap:
    image: curlimages/curl:8.3.0
    container_name: seraph-admin-bootstrap
    restart: "no"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - SETUP_TOKEN=${SETUP_TOKEN:-change-me-setup-token}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-ChangeMe123!}
      - ADMIN_NAME=${ADMIN_NAME:-Administrator}
    entrypoint: ["/bin/sh","-c"]
    command: [ "curl -sS -X POST http://backend:8001/api/auth/setup -H \"X-Setup-Token: ${SETUP_TOKEN}\" -H \"Content-Type: application/json\" -d '{\"email\":\"'\"${ADMIN_EMAIL}\"'\",\"password\":\"'\"${ADMIN_PASSWORD}\"'\",\"name\":\"'\"${ADMIN_NAME}\"'\"}' || true" ]
    networks:
      - seraph-network
    profiles:
      - bootstrap

  trivy:
    image: aquasec/trivy:latest
    container_name: seraph-trivy
    restart: unless-stopped
    command: ["server", "--listen", "0.0.0.0:4954"]
    ports:
      - "4954:4954"
    volumes:
      - trivy_cache:/root/.cache/trivy
    networks:
      - seraph-network
    profiles:
      - security

  # ==========================================================================
  # Falco Runtime Security (optional)
  # ==========================================================================
  falco:
    image: falcosecurity/falco-no-driver:latest
    container_name: seraph-falco
    restart: unless-stopped
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /proc:/host/proc:ro
      - /boot:/host/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - falco_data:/var/log/falco
    networks:
      - seraph-network
    profiles:
      - security

  # ==========================================================================
  # Suricata IDS (optional host sensor)
  # ==========================================================================
  suricata:
    image: jasonish/suricata:latest
    container_name: seraph-suricata
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE
    command: ["-i", "${SURICATA_INTERFACE:-eth0}", "-l", "/var/log/suricata"]
    volumes:
      - suricata_logs:/var/log/suricata
      - ./backend:/app/backend:ro
    profiles:
      - security

  # ==========================================================================
  # Zeek NDR (optional host sensor)
  # ==========================================================================
  zeek:
    image: blacktop/zeek:latest
    container_name: seraph-zeek
    # we do not auto‑restart on Windows – the process usually fails to bind
    # and loops forever.  Instead try several interfaces and then sleep so the
    # container remains inspectable.
    restart: "no"
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    entrypoint: ["/bin/sh", "-lc"]
    command: |
      zeek -i ${ZEEK_INTERFACE:-eth0} || \
      zeek -i any || \
      zeek -i docker0 || \
      zeek -i eth1 || \
      (echo 'Zeek failed to bind interface; sleeping for inspection' && sleep 3600)
    volumes:
      - zeek_logs:/usr/local/zeek/logs
    profiles:
      - security

  # ==========================================================================
  # Cuckoo Sandbox dependencies & API (optional - requires VM/lab tuning)
  # --------------------------------------------------------------------------
  # Cuckoo needs an *older* MongoDB than the rest of Seraph.  The primary
  # database (`seraph-mongodb`) runs Mongo 7, which the upstream Sandbox
  # (Python 2, pymongo 3.x) cannot talk to due to removed OP_QUERY commands.
  # Rather than trying to rewrite Cuckoo, we spin up a second Mongo service
  # just for the sandbox.  All other components continue to use the 7.0
  # server.
  cuckoo-mongo:
    image: mongo:5.0
    container_name: seraph-cuckoo-mongodb
    restart: unless-stopped
    volumes:
      - cuckoo_mongodb_data:/data/db
    networks:
      - seraph-network

  cuckoo:
    build:
      context: ./tools/cuckoo-fix
      dockerfile: Dockerfile
    container_name: seraph-cuckoo
    restart: unless-stopped
    privileged: true
    command: ["api"]
    ports:
      - "8090:8090"
      - "2042:2042"
    environment:
      - CUCKOO_API_HOST=0.0.0.0
      - MONGO_HOST=cuckoo-mongo
      - MONGO_TCP_PORT=27017
    volumes:
      - cuckoo_data:/cuckoo
      - /tmp:/tmp
    depends_on:
      - cuckoo-mongo
    networks:
      - seraph-network
    profiles:
      - sandbox

  cuckoo-web:
    image: blacktop/cuckoo:latest
    container_name: seraph-cuckoo-web
    restart: unless-stopped
    command: web
    ports:
      - "8080:8080"
    environment:
      - CUCKOO_API=http://cuckoo:1337
      - MONGO_HOST=cuckoo-mongo
      - MONGO_TCP_PORT=27017
      - ES_HOST=elasticsearch
      - ES_PORT=9200
    depends_on:
      - cuckoo
      - cuckoo-mongo
    networks:
      - seraph-network
    profiles:
      - sandbox

  # ==========================================================================
  # Frontend React App
  # ==========================================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=${REACT_APP_BACKEND_URL:-}
    container_name: metatron-seraph-v9-frontend-1
    restart: "no"
    ports:
      - "${BIND_FRONTEND_HOST:-127.0.0.1}:3000:80"
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Note: do not bind-mount the host build directory here; the image copies
    # the built files into /usr/share/nginx/html during image build. A host
    # bind would mask the image contents and can leave the webroot empty.
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      seraph-network:
        aliases:
          - frontend
  # ==========================================================================
  # WireGuard VPN Server
  # ==========================================================================
  wireguard:
    image: linuxserver/wireguard:latest
    container_name: seraph-wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=${VPN_SERVER_ENDPOINT:-vpn.yourdomain.com}
      - SERVERPORT=51820
      - PEERS=${VPN_PEERS:-10}
      - INTERNAL_SUBNET=10.200.200.0/24
    volumes:
      - wireguard_config:/config
      - /lib/modules:/lib/modules:ro
    ports:
      - "${BIND_WIREGUARD_HOST:-127.0.0.1}:51820:51820/udp"
    networks:
      - seraph-network

  nginx:
    image: nginx:alpine
    container_name: seraph-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - seraph-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "--no-check-certificate", "https://localhost/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  seraph-network:
    driver: bridge

volumes:
  redis_data:
    driver: local
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  elasticsearch_data:
    driver: local
  ollama_data:
    driver: local
  trivy_cache:
    driver: local
  falco_data:
    driver: local
  suricata_logs:
    driver: local
  zeek_logs:
    driver: local
  osquery_logs:
    driver: local
  atomic_validation_reports:
    driver: local
  cuckoo_data:
    driver: local
  cuckoo_mongodb_data:
    driver: local
  vpn_config:
    driver: local
  wireguard_config:
    driver: local
  certbot_webroot:
    driver: local
