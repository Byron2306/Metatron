title: Defense Evasion - Safe Mode Boot Abuse for EDR Bypass
id: f8a9b0c1-d2e3-4567-fabc-567890123456
status: experimental
description: |
    Detects modifications to boot configuration that enable Safe Mode, which is used
    by adversaries (T1562.009) to disable EDR/AV drivers that don't load in Safe Mode.
    Ransomware groups including REvil/Sodinokibi and BlackMatter have used this
    technique to disable security products before encryption. Also detects adding
    custom Safe Mode auto-start entries to persist payloads through the reboot.
references:
    - https://attack.mitre.org/techniques/T1562/009/
    - https://www.cyberark.com/resources/threat-research-blog/cyberark-labs-from-safe-mode-to-domain-compromise
    - https://news.sophos.com/en-us/2021/08/09/ransomware-attackers-use-your-own-defenses-against-you/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1562.009
logsource:
    category: process_creation
    product: windows
detection:
    selection_bcdedit_safemode:
        Image|endswith: '\bcdedit.exe'
        CommandLine|contains:
            - 'safeboot'
            - 'minimal'
            - 'network'
        CommandLine|re: '(?i)/set\s+\{current\}'
    selection_safemode_registry:
        Image|endswith: '\reg.exe'
        CommandLine|contains:
            - 'HKLM\SYSTEM\CurrentControlSet\Control\SafeBoot'
            - 'Minimal\\'
            - 'Network\\'
    condition: 1 of selection_*
falsepositives:
    - IT administrators troubleshooting boot issues
level: high
