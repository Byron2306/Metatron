title: Defense Evasion - Downgrade Attack via PowerShell Version 2 Invocation
id: a9b0c1d2-e3f4-5678-abcd-678901234567
status: experimental
description: |
    Detects PowerShell being invoked with -Version 2 to downgrade to PowerShell 2.0,
    which lacks AMSI, Script Block Logging, and Constrained Language Mode (T1562.011).
    This is one of the oldest and most documented bypasses — still used because many
    organizations have PS2 enabled. The -Version 2 flag must be combined with -Command
    or -EncodedCommand to execute malicious content.
references:
    - https://attack.mitre.org/techniques/T1562/011/
    - https://www.leeholmes.com/detecting-and-preventing-powershell-downgrade-attacks/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1562.011
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith:
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|contains: '-Version 2'
    filter_legitimate:
        CommandLine|contains: 'PSVersion'
    condition: selection and not filter_legitimate
falsepositives:
    - Legacy scripts that explicitly require PowerShell 2 features
level: high
