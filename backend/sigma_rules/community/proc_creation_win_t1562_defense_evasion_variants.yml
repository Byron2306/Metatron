title: Defense Evasion - Disabling or Tampering with Audit Policy
id: b0c1d2e3-f4a5-6789-bcde-789012345678
status: experimental
description: |
    Detects use of auditpol.exe or Group Policy modification to disable Windows
    audit policies, a T1562.013 technique used to prevent security events from
    being logged. Adversaries disable process tracking, logon events, and object
    access auditing to remove evidence of their activity from Windows Security logs.
references:
    - https://attack.mitre.org/techniques/T1562/013/
    - https://docs.microsoft.com/en-us/windows-server/administration/windows-commands/auditpol
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1562.013
logsource:
    category: process_creation
    product: windows
detection:
    selection_auditpol_disable:
        Image|endswith: '\auditpol.exe'
        CommandLine|contains:
            - '/set'
            - '/success:disable'
            - '/failure:disable'
    selection_auditpol_clear:
        Image|endswith: '\auditpol.exe'
        CommandLine|contains: '/clear'
    condition: 1 of selection_*
falsepositives:
    - Domain administrators configuring audit policy via GPO (should use Group Policy, not auditpol directly)
level: high
