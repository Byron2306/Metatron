title: SVG Smuggling - SVG File Execution Triggering Payload Drop
id: d40c73c5-14a8-4861-b636-a69873f7579f
status: experimental
description: |
    Detects executable or archive files dropped by a browser process following the
    opening of an SVG file. SVG smuggling (T1027.017) embeds JavaScript within valid
    SVG/XML files that reassemble and download malicious payloads. Because SVGs are
    treated as images by email gateways, they bypass attachment filters more reliably
    than HTML smuggling. Threat actors (e.g., TA569, Lumma Stealer campaigns) have
    shifted to SVG delivery as HTML smuggling detections have matured.
references:
    - https://attack.mitre.org/techniques/T1027/017/
    - https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/svg-smuggling-a-new-technique-for-phishing/
    - https://blog.talosintelligence.com/svg-smuggling/
    - https://cofense.com/blog/svg-smuggling-bypasses-secure-email-gateways/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.initial_access
    - attack.t1027.017
    - attack.t1566.001
logsource:
    category: file_event
    product: windows
detection:
    selection_browser:
        Image|endswith:
            - '\msedge.exe'
            - '\chrome.exe'
            - '\firefox.exe'
            - '\iexplore.exe'
    selection_payload_type:
        TargetFilename|endswith:
            - '.exe'
            - '.dll'
            - '.iso'
            - '.img'
            - '.zip'
            - '.ps1'
            - '.js'
            - '.vbs'
            - '.hta'
            - '.bat'
    selection_user_writeable:
        TargetFilename|contains:
            - '\Downloads\'
            - '\AppData\Local\Temp\'
            - '\Desktop\'
    condition: all of selection_*
falsepositives:
    - Legitimate browser file downloads (high noise — combine with SVG open event)
level: medium
