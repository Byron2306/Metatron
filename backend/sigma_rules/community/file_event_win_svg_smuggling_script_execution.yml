title: SVG Smuggling - SVG File Opened Directly from Suspicious Location
id: 024a1fb0-ae47-4843-a9a3-abe92b63ca4f
status: experimental
description: |
    Detects SVG files being opened directly (not as an image in browser) from user
    writable directories, particularly after arriving via email or download. SVG files
    containing <script> tags execute JavaScript when opened in a browser context and
    can trigger Blob-based payload assembly without visible network requests.
references:
    - https://attack.mitre.org/techniques/T1027/017/
    - https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/svg-smuggling-a-new-technique-for-phishing/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1027.017
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        CommandLine|contains: '.svg'
        CommandLine|re: '(?i)(\\Users\\|\\Downloads\\|\\Temp\\|\\Desktop\\|\\AppData\\)'
        Image|endswith:
            - '\msedge.exe'
            - '\chrome.exe'
            - '\firefox.exe'
            - '\iexplore.exe'
            - '\mshta.exe'
    filter_legitimate_svg:
        CommandLine|contains:
            - 'http://'
            - 'https://'
    condition: selection and not filter_legitimate_svg
falsepositives:
    - Designers opening SVG files locally for editing
level: low
