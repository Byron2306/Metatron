title: Hide Artifacts - Email Forwarding Rule Creation for Blind Collection
id: c1d2e3f4-a5b6-7890-cdef-890123456789
status: experimental
description: |
    Detects creation of email forwarding rules via PowerShell or Exchange cmdlets
    that silently forward copies of incoming email to external addresses (T1564.008).
    Nation-state actors and BEC groups create these rules to maintain persistent
    access to email content without repeated authentication. The rules survive
    password resets if not explicitly removed.
references:
    - https://attack.mitre.org/techniques/T1564/008/
    - https://www.cisa.gov/news-events/cybersecurity-advisories/aa23-193a
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.collection
    - attack.t1564.008
logsource:
    category: ps_script
    product: windows
    definition: 'Requires PowerShell Script Block Logging'
detection:
    selection_inbox_rule:
        ScriptBlockText|contains:
            - 'New-InboxRule'
            - 'Set-InboxRule'
        ScriptBlockText|contains:
            - 'ForwardTo'
            - 'ForwardAsAttachmentTo'
            - 'RedirectTo'
    selection_transport_rule:
        ScriptBlockText|contains:
            - 'New-TransportRule'
            - 'Set-TransportRule'
        ScriptBlockText|contains:
            - 'BlindCopyTo'
            - 'CopyTo'
            - 'RedirectMessageTo'
    condition: 1 of selection_*
falsepositives:
    - Legitimate mail flow rules configured by Exchange administrators
    - User-configured forwarding for personal use
level: medium
