title: Hide Artifacts - Portable Executable Hidden in Image File (Polyglot)
id: e3f4a5b6-c7d8-9012-efab-012345678901
status: experimental
description: |
    Detects patterns consistent with creating polyglot files — valid image files
    that also contain functional PE/shellcode (T1564.012). Tools like Invoke-PSImage
    embed PowerShell scripts in pixel data of PNG files; other tools concatenate
    a valid JPEG header with a PE binary. These files pass image validation checks
    but execute as scripts/binaries when processed by the right parser.
references:
    - https://attack.mitre.org/techniques/T1564/012/
    - https://github.com/peewpw/Invoke-PSImage
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1564.012
logsource:
    category: ps_script
    product: windows
    definition: 'Requires PowerShell Script Block Logging'
detection:
    selection_invoke_psimage:
        ScriptBlockText|contains:
            - 'Invoke-PSImage'
            - 'Get-PixelString'
            - 'Get-LSBString'
        ScriptBlockText|contains:
            - '.png'
            - '.jpg'
            - '.bmp'
    selection_iex_from_image:
        ScriptBlockText|contains:
            - 'Invoke-Expression'
            - 'IEX'
        ScriptBlockText|re: '(?i)Get-Content\s+.*\.(png|jpg|bmp|gif|tiff)'
    condition: 1 of selection_*
falsepositives:
    - Steganography research tools
level: high
