title: Hide Artifacts - Resource Fork or ADS Used to Hide Executable Content
id: d2e3f4a5-b6c7-8901-defa-901234567890
status: experimental
description: |
    Detects creation of NTFS Alternate Data Streams (ADS) containing executable
    content (T1564.004 / T1564.009). Adversaries store payloads in ADS attached to
    innocuous files to hide them from directory listings and basic file scanners.
    Zone.Identifier is the most commonly seen ADS, but custom stream names are used
    to hide malware. Streams containing MZ headers or Base64-encoded PE files are
    high-fidelity indicators.
references:
    - https://attack.mitre.org/techniques/T1564/004/
    - https://attack.mitre.org/techniques/T1564/009/
    - https://posts.specterops.io/host-based-threat-modeling-indicator-design-a9dbbb53d5ea
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1564.004
    - attack.t1564.009
logsource:
    category: process_creation
    product: windows
detection:
    selection_ads_create:
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\pwsh.exe'
        CommandLine|re: '(?i)>\s*[^\s]+:[^\s\\/:*?"<>|]+'
    selection_ads_known_tools:
        Image|endswith:
            - '\streams.exe'
            - '\streams64.exe'
        CommandLine|contains: '-s'
    selection_ps_ads:
        ScriptBlockText|re: '(?i)Set-Content\s+.+-Stream\s+|Add-Content\s+.+-Stream\s+'
    condition: 1 of selection_*
falsepositives:
    - Zone.Identifier stream creation by browsers (normal — filter by stream name)
    - Software that uses ADS for legitimate metadata
level: medium
