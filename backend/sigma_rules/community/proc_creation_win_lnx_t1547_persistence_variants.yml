title: Persistence - Plist Modification for macOS/Linux Scheduled Execution
id: b6c7d8e9-f0a1-2345-bcde-345678901234
status: experimental
description: |
    Detects creation or modification of plist files in LaunchDaemon and LaunchAgent
    directories (T1547.007) for macOS persistence, or systemd service unit files
    on Linux. Adversaries use these to achieve persistence that survives reboots
    and runs with elevated privileges (LaunchDaemon = root).
references:
    - https://attack.mitre.org/techniques/T1547/007/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.persistence
    - attack.t1547.007
logsource:
    category: file_event
    product: linux
detection:
    selection_systemd_persistence:
        TargetFilename|startswith:
            - '/etc/systemd/system/'
            - '/usr/lib/systemd/system/'
            - '/home/'
            - '/root/'
        TargetFilename|endswith: '.service'
    filter_package_manager:
        Image|endswith:
            - '/apt'
            - '/apt-get'
            - '/dpkg'
            - '/rpm'
            - '/yum'
            - '/dnf'
            - '/zypper'
    condition: selection_systemd_persistence and not filter_package_manager
falsepositives:
    - System administrators installing custom services
    - Software installation via package managers (filter above)
level: medium
