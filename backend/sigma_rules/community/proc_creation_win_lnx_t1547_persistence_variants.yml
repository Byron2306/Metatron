title: Persistence - Port Monitor DLL Hijack via Print Processor Registry
id: a5b6c7d8-e9f0-1234-abcd-234567890123
status: experimental
description: |
    Detects registration of a custom port monitor or print processor DLL in the
    Windows registry (T1547.007 / T1547.013). The Print Spooler service loads
    DLLs from HKLM\SYSTEM\CurrentControlSet\Control\Print\Monitors and
    \Print\Environments at startup with SYSTEM privileges. This is a classic
    stealthy persistence vector that survives reboots and runs before most
    security software.
references:
    - https://attack.mitre.org/techniques/T1547/013/
    - https://pentestlab.blog/2019/10/28/persistence-port-monitors/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.persistence
    - attack.privilege_escalation
    - attack.t1547.013
logsource:
    category: registry_set
    product: windows
detection:
    selection_print_monitor:
        TargetObject|contains:
            - '\SYSTEM\CurrentControlSet\Control\Print\Monitors\'
            - '\SYSTEM\CurrentControlSet\Control\Print\Environments\'
        TargetObject|endswith:
            - '\Driver'
            - '\Dll'
    filter_legit_drivers:
        Details|contains:
            - 'localspl.dll'
            - 'tcpmon.dll'
            - 'usbmon.dll'
            - 'WSDMon.dll'
            - 'win32spl.dll'
    condition: selection_print_monitor and not filter_legit_drivers
falsepositives:
    - Legitimate printer driver installation
level: high
