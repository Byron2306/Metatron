title: Persistence - Netlogon Script Modification for Domain-Wide Execution
id: f4a5b6c7-d8e9-0123-fabc-123456789012
status: experimental
description: |
    Detects modification of Netlogon scripts (T1547.012) used for domain-wide
    persistence. Files written to SYSVOL\NETLOGON are executed on every domain
    computer at logon. Adversaries who compromise a domain controller or have
    write access to NETLOGON can deploy malware to every domain-joined host
    without additional lateral movement.
references:
    - https://attack.mitre.org/techniques/T1547/012/
    - https://adsecurity.org/?p=2716
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.persistence
    - attack.t1547.012
logsource:
    category: file_event
    product: windows
detection:
    selection_netlogon_write:
        TargetFilename|contains:
            - '\NETLOGON\'
            - '\SYSVOL\'
        TargetFilename|endswith:
            - '.bat'
            - '.cmd'
            - '.ps1'
            - '.vbs'
            - '.exe'
            - '.dll'
    filter_dc_admin:
        Image|endswith:
            - '\dfs.exe'
            - '\dfssvc.exe'
    condition: selection_netlogon_write and not filter_dc_admin
falsepositives:
    - Domain administrators intentionally deploying logon scripts via SYSVOL
level: high
