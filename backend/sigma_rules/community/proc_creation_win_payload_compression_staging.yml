title: Compression for Payload Staging - Suspicious Archive Creation Before Execution
id: 6138d70f-bd6a-4c43-b7ed-9928252f1461
status: experimental
description: |
    Detects compression tools being used to package payloads in user-writable staging
    directories. T1027.015 (Compression) is used to obfuscate payload content, bypass
    file size thresholds in AV/EDR, and deliver shellcode within archive containers.
    Particularly suspicious when the archive is created in temp/appdata followed by
    execution. Concatenated/polyglot ZIPs (multiple central directories) are used to
    evade ZIP parsers in email gateways.
references:
    - https://attack.mitre.org/techniques/T1027/015/
    - https://www.trustwave.com/en-us/resources/blogs/spiderlabs-blog/pillowmint-fin7s-monkey-thief/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1027.015
logsource:
    category: process_creation
    product: windows
detection:
    selection_compress_tools:
        Image|endswith:
            - '\7z.exe'
            - '\7za.exe'
            - '\rar.exe'
            - '\winrar.exe'
            - '\zip.exe'
            - '\compress.exe'
    selection_staging_path:
        CommandLine|contains:
            - '\AppData\Local\Temp\'
            - '\AppData\Roaming\'
            - '\Users\Public\'
            - '\Windows\Temp\'
            - '\ProgramData\'
    selection_suspicious_flags:
        CommandLine|contains:
            - ' a '
            - '-p'
            - '-mhe'
            - '-r'
    condition: selection_compress_tools and selection_staging_path and selection_suspicious_flags
falsepositives:
    - Backup software compressing to temp locations
    - Legitimate installers self-extracting archives
level: low
