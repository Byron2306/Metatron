title: Compression for Payload Staging - PowerShell Compress-Archive on Sensitive Paths
id: e7b5a0fb-84e0-4bd1-af22-ba82d9386d08
status: experimental
description: |
    Detects PowerShell Compress-Archive cmdlet being used to compress files from
    sensitive system paths or to stage in user-writable directories. Used in T1027.015
    to package collected data or obfuscate payloads before exfiltration or execution.
references:
    - https://attack.mitre.org/techniques/T1027/015/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.collection
    - attack.t1027.015
    - attack.t1560.001
logsource:
    category: ps_script
    product: windows
    definition: 'Requires PowerShell Script Block Logging (Event ID 4104)'
detection:
    selection_cmdlet:
        ScriptBlockText|contains:
            - 'Compress-Archive'
    selection_sensitive_source:
        ScriptBlockText|re: '(?i)(C:\\Windows\\|C:\\Users\\[^\\]+\\AppData\\Roaming\\|NTDS|SAM|SYSTEM|SECURITY)'
    condition: all of selection_*
falsepositives:
    - IT backup scripts
    - Legitimate log archival tasks
level: medium
