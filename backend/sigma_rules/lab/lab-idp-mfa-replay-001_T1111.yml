title: Lab synthetic MfaTokenReplay on tagged canary (honey_mfa_token) — T1111
id: lab-idp-mfa-replay-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_mfa_token) is observed with the metatron_run_id tag and the
  expected event_type matches MfaTokenReplay. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1111
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1111
  - lab.canary
  - lab.identity_provider
logsource:
  product: lab_audit
  service: identity_provider
  category: mfa_intercept
detection:
  selection:
    event_type: 'MfaTokenReplay'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
