title: Lab synthetic GetSecretValue on tagged canary (honey_secret) — T1647
id: lab-cloud-secret-read-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_secret) is observed with the metatron_run_id tag and the
  expected event_type matches GetSecretValue. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1647
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1647
  - lab.canary
  - lab.cloudtrail
logsource:
  product: lab_audit
  service: cloudtrail
  category: cloud_credentials
detection:
  selection:
    event_type: 'GetSecretValue'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
