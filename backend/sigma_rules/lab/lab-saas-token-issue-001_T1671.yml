title: Lab synthetic ApiTokenIssued on tagged canary (honey_api_token) — T1671
id: lab-saas-token-issue-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_api_token) is observed with the metatron_run_id tag and the
  expected event_type matches ApiTokenIssued. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1671
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1671
  - lab.canary
  - lab.saas_audit
logsource:
  product: lab_audit
  service: saas_audit
  category: saas_token_steal
detection:
  selection:
    event_type: 'ApiTokenIssued'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
