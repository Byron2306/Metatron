title: Lab synthetic PamConfigModified on tagged canary (honey_pam_module) — T1556.003
id: lab-idp-pam-modify-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_pam_module) is observed with the metatron_run_id tag and the
  expected event_type matches PamConfigModified. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1556/003
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1556.003
  - lab.canary
  - lab.identity_provider
logsource:
  product: lab_audit
  service: identity_provider
  category: auth_modify
detection:
  selection:
    event_type: 'PamConfigModified'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
