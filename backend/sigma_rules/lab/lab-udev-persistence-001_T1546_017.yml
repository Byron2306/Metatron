title: Lab synthetic UdevRuleRegistered on tagged canary (honey_udev_rule) — T1546.017
id: lab-udev-persistence-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_udev_rule) is observed with the metatron_run_id tag and the
  expected event_type matches UdevRuleRegistered. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1546/017
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1546.017
  - lab.canary
  - lab.edr_filesystem_audit
logsource:
  product: lab_audit
  service: edr_filesystem_audit
  category: init_persistence
detection:
  selection:
    event_type: 'UdevRuleRegistered'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
