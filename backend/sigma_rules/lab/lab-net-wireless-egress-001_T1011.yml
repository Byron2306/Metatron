title: Lab synthetic WirelessAssociation on tagged canary (honey_ap) — T1011
id: lab-net-wireless-egress-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_ap) is observed with the metatron_run_id tag and the
  expected event_type matches WirelessAssociation. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1011
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1011
  - lab.canary
  - lab.network_device_audit
logsource:
  product: lab_audit
  service: network_device_audit
  category: network_egress
detection:
  selection:
    event_type: 'WirelessAssociation'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
