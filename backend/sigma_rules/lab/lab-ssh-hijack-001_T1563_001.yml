title: Lab synthetic SshHijackAttempt on tagged canary (honey_ssh_session) — T1563.001
id: lab-ssh-hijack-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_ssh_session) is observed with the metatron_run_id tag and the
  expected event_type matches SshHijackAttempt. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1563/001
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1563.001
  - lab.canary
  - lab.edr_session_audit
logsource:
  product: lab_audit
  service: edr_session_audit
  category: remote_session
detection:
  selection:
    event_type: 'SshHijackAttempt'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
