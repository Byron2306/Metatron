title: Lab synthetic TftpConfigPull on tagged canary (honey_tftp_canary) — T1602.002
id: lab-tftp-pull-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_tftp_canary) is observed with the metatron_run_id tag and the
  expected event_type matches TftpConfigPull. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1602/002
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1602.002
  - lab.canary
  - lab.network_device_audit
logsource:
  product: lab_audit
  service: network_device_audit
  category: config_repo
detection:
  selection:
    event_type: 'TftpConfigPull'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
