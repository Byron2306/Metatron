title: Lab synthetic RunInstances on tagged canary (honey_compute) — T1578.002
id: lab-cloud-create-instance-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_compute) is observed with the metatron_run_id tag and the
  expected event_type matches RunInstances. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1578/002
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1578.002
  - lab.canary
  - lab.cloudtrail
logsource:
  product: lab_audit
  service: cloudtrail
  category: cloud_iaas
detection:
  selection:
    event_type: 'RunInstances'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
