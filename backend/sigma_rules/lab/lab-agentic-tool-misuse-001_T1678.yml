title: Lab synthetic AgenticToolMisuse on tagged canary (honey_agent_tool) — T1678
id: lab-agentic-tool-misuse-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_agent_tool) is observed with the metatron_run_id tag and the
  expected event_type matches AgenticToolMisuse. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1678
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1678
  - lab.canary
  - lab.saas_audit
logsource:
  product: lab_audit
  service: saas_audit
  category: agentic_pivot
detection:
  selection:
    event_type: 'AgenticToolMisuse'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
