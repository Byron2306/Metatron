title: Lab synthetic WebPortalCredentialCapture on tagged canary (honey_web_portal) — T1056.003
id: lab-web-portal-capture-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_web_portal) is observed with the metatron_run_id tag and the
  expected event_type matches WebPortalCredentialCapture. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1056/003
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1056.003
  - lab.canary
  - lab.edr_input_audit
logsource:
  product: lab_audit
  service: edr_input_audit
  category: input_capture
detection:
  selection:
    event_type: 'WebPortalCredentialCapture'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
