title: Lab synthetic LogonScriptModified on tagged canary (honey_logon_script) — T1037.002
id: lab-logon-script-modify-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_logon_script) is observed with the metatron_run_id tag and the
  expected event_type matches LogonScriptModified. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1037/002
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1037.002
  - lab.canary
  - lab.edr_filesystem_audit
logsource:
  product: lab_audit
  service: edr_filesystem_audit
  category: logon_persistence
detection:
  selection:
    event_type: 'LogonScriptModified'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
