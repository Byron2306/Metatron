title: Lab synthetic ReduceKeySpaceConfig on tagged canary (honey_network_device) — T1600.001
id: lab-net-keyspace-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_network_device) is observed with the metatron_run_id tag and the
  expected event_type matches ReduceKeySpaceConfig. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1600/001
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1600.001
  - lab.canary
  - lab.network_device_audit
logsource:
  product: lab_audit
  service: network_device_audit
  category: net_device_weaken
detection:
  selection:
    event_type: 'ReduceKeySpaceConfig'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
