title: Lab synthetic InstallerPackageRegistered on tagged canary (honey_pkg_payload) — T1546.016
id: lab-installer-persistence-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_pkg_payload) is observed with the metatron_run_id tag and the
  expected event_type matches InstallerPackageRegistered. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1546/016
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1546.016
  - lab.canary
  - lab.edr_filesystem_audit
logsource:
  product: lab_audit
  service: edr_filesystem_audit
  category: init_persistence
detection:
  selection:
    event_type: 'InstallerPackageRegistered'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
