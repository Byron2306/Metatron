title: Lab synthetic RemovableMediaInserted on tagged canary (honey_usb) — T1052
id: lab-usb-insert-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_usb) is observed with the metatron_run_id tag and the
  expected event_type matches RemovableMediaInserted. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1052
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1052
  - lab.canary
  - lab.edr_usb_audit
logsource:
  product: lab_audit
  service: edr_usb_audit
  category: physical_media
detection:
  selection:
    event_type: 'RemovableMediaInserted'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
