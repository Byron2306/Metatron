title: Lab synthetic AgenticPersistenceLink on tagged canary (honey_agent_persistence) — T1680
id: lab-agentic-persistence-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_agent_persistence) is observed with the metatron_run_id tag and the
  expected event_type matches AgenticPersistenceLink. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1680
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1680
  - lab.canary
  - lab.saas_audit
logsource:
  product: lab_audit
  service: saas_audit
  category: agentic_persistence
detection:
  selection:
    event_type: 'AgenticPersistenceLink'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
