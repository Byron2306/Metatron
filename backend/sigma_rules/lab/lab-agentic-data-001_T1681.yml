title: Lab synthetic AgenticDataExfilQuery on tagged canary (honey_agent_query) — T1681
id: lab-agentic-data-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_agent_query) is observed with the metatron_run_id tag and the
  expected event_type matches AgenticDataExfilQuery. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1681
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1681
  - lab.canary
  - lab.saas_audit
logsource:
  product: lab_audit
  service: saas_audit
  category: agentic_data_acquisition
detection:
  selection:
    event_type: 'AgenticDataExfilQuery'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
