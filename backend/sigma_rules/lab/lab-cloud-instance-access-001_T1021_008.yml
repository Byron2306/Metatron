title: Lab synthetic DirectCloudInstanceAccess on tagged canary (honey_cloud_instance) — T1021.008
id: lab-cloud-instance-access-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_cloud_instance) is observed with the metatron_run_id tag and the
  expected event_type matches DirectCloudInstanceAccess. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1021/008
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1021.008
  - lab.canary
  - lab.cloudtrail
logsource:
  product: lab_audit
  service: cloudtrail
  category: remote_services
detection:
  selection:
    event_type: 'DirectCloudInstanceAccess'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
