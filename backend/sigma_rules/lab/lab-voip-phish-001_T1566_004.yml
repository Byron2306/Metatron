title: Lab synthetic VoipInboundCallback on tagged canary (honey_phone_canary) — T1566.004
id: lab-voip-phish-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_phone_canary) is observed with the metatron_run_id tag and the
  expected event_type matches VoipInboundCallback. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1566/004
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1566.004
  - lab.canary
  - lab.voip_gateway
logsource:
  product: lab_audit
  service: voip_gateway
  category: phishing_voice
detection:
  selection:
    event_type: 'VoipInboundCallback'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
