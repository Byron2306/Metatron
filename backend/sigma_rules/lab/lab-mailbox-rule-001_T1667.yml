title: Lab synthetic ExternalEmailRule on tagged canary (honey_mailbox_rule) — T1667
id: lab-mailbox-rule-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_mailbox_rule) is observed with the metatron_run_id tag and the
  expected event_type matches ExternalEmailRule. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1667
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1667
  - lab.canary
  - lab.saas_audit
logsource:
  product: lab_audit
  service: saas_audit
  category: email_rules
detection:
  selection:
    event_type: 'ExternalEmailRule'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
