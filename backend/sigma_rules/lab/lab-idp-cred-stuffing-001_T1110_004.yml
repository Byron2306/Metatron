title: Lab synthetic CredentialStuffing on tagged canary (honey_decoy_account) — T1110.004
id: lab-idp-cred-stuffing-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_decoy_account) is observed with the metatron_run_id tag and the
  expected event_type matches CredentialStuffing. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1110/004
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1110.004
  - lab.canary
  - lab.identity_provider
logsource:
  product: lab_audit
  service: identity_provider
  category: auth_brute
detection:
  selection:
    event_type: 'CredentialStuffing'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
