title: Lab synthetic OAuthConsentGranted on tagged canary (honey_oauth_app) — T1672
id: lab-oauth-consent-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_oauth_app) is observed with the metatron_run_id tag and the
  expected event_type matches OAuthConsentGranted. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1672
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1672
  - lab.canary
  - lab.saas_audit
logsource:
  product: lab_audit
  service: saas_audit
  category: saas_app_inject
detection:
  selection:
    event_type: 'OAuthConsentGranted'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
