title: Lab synthetic ExcludeIamFromLogging on tagged canary (honey_iam_role) — T1668
id: lab-iam-exclude-logging-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_iam_role) is observed with the metatron_run_id tag and the
  expected event_type matches ExcludeIamFromLogging. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1668
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1668
  - lab.canary
  - lab.cloudtrail
logsource:
  product: lab_audit
  service: cloudtrail
  category: exclude_iam_role
detection:
  selection:
    event_type: 'ExcludeIamFromLogging'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
