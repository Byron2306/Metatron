title: Lab synthetic AuthorizationEscalation on tagged canary (honey_macos_user) — T1548.004
id: lab-macos-auth-escalation-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_macos_user) is observed with the metatron_run_id tag and the
  expected event_type matches AuthorizationEscalation. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1548/004
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1548.004
  - lab.canary
  - lab.edr_macos_audit
logsource:
  product: lab_audit
  service: edr_macos_audit
  category: privesc_macos
detection:
  selection:
    event_type: 'AuthorizationEscalation'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
