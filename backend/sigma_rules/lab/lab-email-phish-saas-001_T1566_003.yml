title: Lab synthetic MailFlowReceiveSuspicious on tagged canary (honey_mailbox_canary) — T1566.003
id: lab-email-phish-saas-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_mailbox_canary) is observed with the metatron_run_id tag and the
  expected event_type matches MailFlowReceiveSuspicious. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1566/003
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1566.003
  - lab.canary
  - lab.email_gateway
logsource:
  product: lab_audit
  service: email_gateway
  category: phishing_service
detection:
  selection:
    event_type: 'MailFlowReceiveSuspicious'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
