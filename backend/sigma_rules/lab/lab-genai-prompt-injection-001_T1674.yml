title: Lab synthetic PromptInjectionDetected on tagged canary (honey_genai_prompt) — T1674
id: lab-genai-prompt-injection-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_genai_prompt) is observed with the metatron_run_id tag and the
  expected event_type matches PromptInjectionDetected. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1674
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1674
  - lab.canary
  - lab.saas_audit
logsource:
  product: lab_audit
  service: saas_audit
  category: input_capture_genai
detection:
  selection:
    event_type: 'PromptInjectionDetected'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
