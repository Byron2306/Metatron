title: Lab synthetic ContainerExecCommand on tagged canary (honey_container) — T1609
id: lab-container-exec-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_container) is observed with the metatron_run_id tag and the
  expected event_type matches ContainerExecCommand. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1609
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1609
  - lab.canary
  - lab.container_runtime_audit
logsource:
  product: lab_audit
  service: container_runtime_audit
  category: container_admin
detection:
  selection:
    event_type: 'ContainerExecCommand'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
