title: Lab synthetic StegoEmbeddedC2 on tagged canary (honey_image_payload) — T1001.002
id: lab-stego-c2-001
status: experimental
description: >
  Lab-synthetic Sigma rule. Fires when an audit-channel event for the canary
  lure (honey_image_payload) is observed with the metatron_run_id tag and the
  expected event_type matches StegoEmbeddedC2. Used to validate
  detection coverage for techniques that cannot be exercised by Linux atomics.
references:
  - https://attack.mitre.org/techniques/T1001/002
author: metatron-lab-harvester
date: 2026/04/27
tags:
  - attack.t1001.002
  - lab.canary
  - lab.network_device_audit
logsource:
  product: lab_audit
  service: network_device_audit
  category: c2_steganography
detection:
  selection:
    event_type: 'StegoEmbeddedC2'
    tags.metatron_run_id|exists: true
  condition: selection
falsepositives:
  - None expected when canary is tagged metatron and safe_to_delete=true
level: high
