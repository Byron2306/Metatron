title: Resource Hijacking via CPU Overload
id: 0l4i5j3k-1g6h-6i9j-0k3l-4h7g8i1j6k7l
status: experimental
description: Detects processes causing excessive CPU usage for resource hijacking
references:
  - https://attack.mitre.org/techniques/T1496/001/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'dd if=/dev/zero'
      - 'stress'
      - 'cpu'
  condition: selection
falsepositives:
  - Benchmarking tools
  - System testing
level: medium
tags:
  - attack.impact
  - attack.t1496.001
