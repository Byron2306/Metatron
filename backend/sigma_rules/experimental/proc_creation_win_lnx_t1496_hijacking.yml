title: Resource Hijacking via Memory Exhaustion
id: 2n6k7l5m-3i8j-8k1l-2m5n-6j9i0k3l8m9n
status: experimental
description: Detects attempts to exhaust memory resources
references:
  - https://attack.mitre.org/techniques/T1496/003/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: linux
detection:
  selection:
    CommandLine|contains:
      - 'malloc'
      - 'memory stress'
      - ':(){ :|:& };:'  # fork bomb
  condition: selection
falsepositives:
  - Memory testing tools
level: high
tags:
  - attack.impact
  - attack.t1496.003