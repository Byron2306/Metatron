title: SVG Smuggling Script Execution
id: 4l8i9j7k-5g0h-0i3j-4k7l-8h1g2i5j0k1l
status: experimental
description: Detects execution of scripts embedded in SVG files, used for SVG smuggling attacks
references:
  - https://attack.mitre.org/techniques/T1027/017/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: file_event
  product: windows
detection:
  selection:
    EventType: Create
    TargetFilename|endswith: '.svg'
    TargetFilename|contains|all:
      - '<script'
      - 'eval('
  condition: selection
falsepositives:
  - Legitimate SVG files with embedded scripts
  - Web development
level: medium
tags:
  - attack.defense_evasion
  - attack.t1027.017
