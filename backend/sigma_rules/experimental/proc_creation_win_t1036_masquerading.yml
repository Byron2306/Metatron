title: Masquerading via Invalid File Extension
id: 3e7b8c6d-4z9a-9b2c-3d6e-7a0z1b4c9d0e
status: experimental
description: Detects files with mismatched extensions, often used for masquerading
references:
  - https://attack.mitre.org/techniques/T1036/009/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: file_event
  product: windows
detection:
  selection:
    EventType: Create
    TargetFilename|contains:
      - '.exe.txt'
      - '.dll.jpg'
      - '.scr.png'
  condition: selection
falsepositives:
  - Legitimate file renaming
level: medium
tags:
  - attack.defense_evasion
  - attack.t1036.009
