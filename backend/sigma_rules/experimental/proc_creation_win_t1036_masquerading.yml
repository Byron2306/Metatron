title: Masquerading via Rename to Common Extension
id: 6h0e1f9g-7c2d-2e5f-6g9h-0d3c4e7f2g3h
status: experimental
description: Detects renaming executables to common file extensions
references:
  - https://attack.mitre.org/techniques/T1036/012/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: file_event
  product: windows
detection:
  selection:
    EventType: Rename
    TargetFilename|endswith:
      - '.txt'
      - '.jpg'
      - '.png'
      - '.pdf'
    TargetFilename|contains:
      - 'cmd'
      - 'powershell'
  condition: selection
falsepositives:
  - Legitimate file operations
level: medium
tags:
  - attack.defense_evasion
  - attack.t1036.012