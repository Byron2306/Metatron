title: Masquerading via Right-to-Left Override
id: 4f8c9d7e-5a0b-0c3d-4e7f-8b1a2c5d0e1f
status: experimental
description: Detects use of Right-to-Left Override character for filename masquerading
references:
  - https://attack.mitre.org/techniques/T1036/010/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: file_event
  product: windows
detection:
  selection:
    EventType: Create
    TargetFilename|contains: '\u202E'
  condition: selection
falsepositives:
  - Files with legitimate RTL characters
level: high
tags:
  - attack.defense_evasion
  - attack.t1036.010
