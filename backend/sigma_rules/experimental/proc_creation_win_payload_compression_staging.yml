title: Payload Compression Staging Execution
id: 1s5p6q4r-2n7o-7p0q-1r4s-5o8n9p2q7r8s
status: experimental
description: Detects execution of compressed payloads that may be staged for further processing
references:
  - https://attack.mitre.org/techniques/T1027/015/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
      - 'expand'
      - '.cab'
      - '.zip'
    CommandLine|contains:
      - 'powershell'
      - 'cmd'
  condition: selection
falsepositives:
  - Legitimate archive extraction
  - Software installation
level: medium
tags:
  - attack.defense_evasion
  - attack.t1027.015
---
title: Payload Compression Archive Creation
id: 2t6q7r5s-3o8p-8q1r-2s5t-6p9o0q3r8s9t
status: experimental
description: Detects creation of compressed archives containing potential payloads
references:
  - https://attack.mitre.org/techniques/T1027/015/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: file_event
  product: windows
detection:
  selection:
    EventType: Create
    TargetFilename|endswith:
      - '.7z'
      - '.rar'
      - '.cab'
    TargetFilename|contains:
      - 'temp'
      - 'tmp'
      - 'cache'
  condition: selection
falsepositives:
  - Legitimate archiving operations
  - Backup processes
level: low
tags:
  - attack.defense_evasion
  - attack.t1027.015