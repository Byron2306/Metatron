<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1600" viewBox="0 0 1800 1600">
  <defs>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .subtitle { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .layerTitle { font: 700 16px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .node { font: 13px 'Segoe UI', Arial, sans-serif; fill: #111827; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #374151; }
      .box { stroke: #374151; stroke-width: 1.2; rx: 8; ry: 8; }
      .layer { stroke: #1f2937; stroke-width: 1.6; rx: 14; ry: 14; }
      .connector { stroke: #6b7280; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
      .thin { stroke-width: 1.2; }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#6b7280" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1800" height="1600" fill="#f8fafc"/>
  <text x="40" y="42" class="title">Metatron / Seraph AI Defense — Layered Architecture (v6.6)</text>
  <text x="40" y="70" class="subtitle">Comprehensive logical map: edge, UX, API mesh, domain services, enterprise controls, advanced services, data and runtime</text>

  <!-- L0 -->
  <rect class="layer" x="30" y="95" width="1740" height="115" fill="#e0f2fe"/>
  <text x="48" y="120" class="layerTitle">L0 — Edge &amp; Access</text>
  <rect class="box" x="50" y="135" width="240" height="55" fill="#ffffff"/><text x="68" y="168" class="node">SOC Analyst (Web UI)</text>
  <rect class="box" x="305" y="135" width="220" height="55" fill="#ffffff"/><text x="322" y="168" class="node">Operator / API Client</text>
  <rect class="box" x="540" y="135" width="320" height="55" fill="#ffffff"/><text x="558" y="168" class="node">Endpoint / Unified Agent (Desktop/Server/Mobile)</text>
  <rect class="box" x="875" y="135" width="220" height="55" fill="#ffffff"/><text x="900" y="168" class="node">Browser Extension</text>
  <rect class="box" x="1110" y="135" width="630" height="55" fill="#fff7ed"/>
  <text x="1130" y="160" class="node">Nginx Reverse Proxy (HTTP/HTTPS, TLS, WS Upgrade, rate limits, security headers)</text>

  <!-- L1 -->
  <rect class="layer" x="30" y="225" width="1740" height="165" fill="#ecfeff"/>
  <text x="48" y="250" class="layerTitle">L1 — Presentation &amp; Operations UX</text>
  <rect class="box" x="50" y="267" width="250" height="45" fill="#ffffff"/><text x="64" y="295" class="node">Command Center / Swarm Dashboard</text>
  <rect class="box" x="315" y="267" width="250" height="45" fill="#ffffff"/><text x="329" y="295" class="node">Threats, Alerts, Network Topology</text>
  <rect class="box" x="580" y="267" width="240" height="45" fill="#ffffff"/><text x="594" y="295" class="node">SOAR + Tactical Heatmap</text>
  <rect class="box" x="835" y="267" width="280" height="45" fill="#ffffff"/><text x="850" y="295" class="node">Zero Trust, VPN, Threat Hunting</text>
  <rect class="box" x="1130" y="267" width="260" height="45" fill="#ffffff"/><text x="1146" y="295" class="node">Tenants + Unified Agent + Setup</text>
  <rect class="box" x="1405" y="267" width="335" height="45" fill="#ffffff"/><text x="1422" y="295" class="node">Reports / PDF / Browser Extension Ops</text>

  <rect class="box" x="50" y="324" width="300" height="45" fill="#ffffff"/><text x="64" y="352" class="node">Auth-protected React routes + WebSocket client</text>
  <rect class="box" x="365" y="324" width="450" height="45" fill="#ffffff"/><text x="380" y="352" class="node">Live widgets: telemetry stats, queue approvals, MITRE views, deployment states</text>
  <rect class="box" x="830" y="324" width="430" height="45" fill="#ffffff"/><text x="845" y="352" class="node">Configuration screens: alerts channels, scanner setup, tenant quotas, feature flags</text>
  <rect class="box" x="1275" y="324" width="465" height="45" fill="#ffffff"/><text x="1290" y="352" class="node">Operational downloads: agent package, install scripts, extension package, templates</text>

  <!-- L2 -->
  <rect class="layer" x="30" y="405" width="1740" height="190" fill="#f0fdf4"/>
  <text x="48" y="430" class="layerTitle">L2 — API Surface (FastAPI Router Mesh)</text>
  <rect class="box" x="50" y="445" width="210" height="40" fill="#ffffff"/><text x="66" y="470" class="node">Auth + Users</text>
  <rect class="box" x="270" y="445" width="240" height="40" fill="#ffffff"/><text x="287" y="470" class="node">Threats + Alerts + Dashboard</text>
  <rect class="box" x="520" y="445" width="300" height="40" fill="#ffffff"/><text x="537" y="470" class="node">AI Analysis + Hunting + Threat Intel</text>
  <rect class="box" x="830" y="445" width="280" height="40" fill="#ffffff"/><text x="848" y="470" class="node">Agents + Agent Commands + WS</text>
  <rect class="box" x="1120" y="445" width="260" height="40" fill="#ffffff"/><text x="1138" y="470" class="node">SOAR + Response + Quarantine</text>
  <rect class="box" x="1390" y="445" width="350" height="40" fill="#ffffff"/><text x="1407" y="470" class="node">VPN + Containers + EDR + Zero Trust + Sandbox</text>

  <rect class="box" x="50" y="497" width="330" height="40" fill="#ffffff"/><text x="66" y="522" class="node">Advanced: MCP, Vector Memory, VNS, Quantum, AI Reasoning</text>
  <rect class="box" x="390" y="497" width="240" height="40" fill="#ffffff"/><text x="407" y="522" class="node">Swarm + AATL/AATR</text>
  <rect class="box" x="640" y="497" width="220" height="40" fill="#ffffff"/><text x="658" y="522" class="node">Reports + PDF + Health</text>
  <rect class="box" x="870" y="497" width="250" height="40" fill="#ffffff"/><text x="887" y="522" class="node">Browser Extension API</text>
  <rect class="box" x="1130" y="497" width="220" height="40" fill="#ffffff"/><text x="1147" y="522" class="node">Multi-Tenant API</text>
  <rect class="box" x="1360" y="497" width="380" height="40" fill="#ffffff"/><text x="1377" y="522" class="node">Unified Agent Download / Install Script Endpoints</text>

  <text x="52" y="565" class="small">API layer coordinates authentication, validation, orchestration and persistence across all capability domains.</text>

  <!-- L3+L4+L5 -->
  <rect class="layer" x="30" y="610" width="1740" height="280" fill="#fef9c3"/>
  <text x="48" y="635" class="layerTitle">L3/L4/L5 — Domain Security Services + Enterprise Controls + Advanced Security Plane</text>

  <!-- L3 left -->
  <rect class="box" x="50" y="650" width="550" height="220" fill="#ffffff"/>
  <text x="68" y="675" class="layerTitle">L3 Domain Security Services</text>
  <text x="68" y="702" class="node">• Threat Correlation Engine + Timeline Builder + Audit Logging</text>
  <text x="68" y="726" class="node">• SOAR Engine + Playbook Executor + Threat Response automation</text>
  <text x="68" y="750" class="node">• Ransomware Protection + Container Security (Trivy) + EDR</text>
  <text x="68" y="774" class="node">• Honey Tokens + Browser Isolation + VPN Integration Manager</text>
  <text x="68" y="798" class="node">• ML Threat Prediction + Sandbox Analysis + Kibana integration</text>
  <text x="68" y="822" class="node">• Notifications (Slack / Email / SMS) + report generation hooks</text>

  <!-- L4 middle -->
  <rect class="box" x="620" y="650" width="550" height="220" fill="#ffffff"/>
  <text x="638" y="675" class="layerTitle">L4 Enterprise Security Control Plane</text>
  <text x="638" y="702" class="node">• Identity &amp; Attestation</text>
  <text x="638" y="726" class="node">• Policy Engine (PDP/PEP)</text>
  <text x="638" y="750" class="node">• Token Broker (scoped capability tokens)</text>
  <text x="638" y="774" class="node">• Tool Gateway (governed command/tool execution)</text>
  <text x="638" y="798" class="node">• Tamper-Evident Telemetry Chain</text>
  <text x="638" y="822" class="node">• Enforcement gates before high-impact remediation actions</text>

  <!-- L5 right -->
  <rect class="box" x="1190" y="650" width="550" height="220" fill="#ffffff"/>
  <text x="1208" y="675" class="layerTitle">L5 Advanced Security Services Plane</text>
  <text x="1208" y="702" class="node">• MCP Governance Services</text>
  <text x="1208" y="726" class="node">• Vector Memory + semantic retrieval context</text>
  <text x="1208" y="750" class="node">• VNS (Virtual Network Sensor)</text>
  <text x="1208" y="774" class="node">• Quantum Security readiness (Kyber/Dilithium path)</text>
  <text x="1208" y="798" class="node">• AI Reasoning abstraction</text>
  <text x="1208" y="822" class="node">• AATL + AATR with MITRE ATT&amp;CK mapping</text>

  <!-- L6 -->
  <rect class="layer" x="30" y="905" width="1740" height="180" fill="#ede9fe"/>
  <text x="48" y="930" class="layerTitle">L6 — Data Plane &amp; Persistence</text>
  <rect class="box" x="50" y="945" width="300" height="48" fill="#ffffff"/><text x="67" y="974" class="node">MongoDB core datastore</text>
  <rect class="box" x="365" y="945" width="315" height="48" fill="#ffffff"/><text x="382" y="974" class="node">Threat/Alert/Audit/Timeline collections</text>
  <rect class="box" x="695" y="945" width="300" height="48" fill="#ffffff"/><text x="712" y="974" class="node">Swarm/Agent/Deployment state</text>
  <rect class="box" x="1010" y="945" width="330" height="48" fill="#ffffff"/><text x="1027" y="974" class="node">SOAR playbooks/templates + response logs</text>
  <rect class="box" x="1355" y="945" width="385" height="48" fill="#ffffff"/><text x="1372" y="974" class="node">Multi-tenant metadata, quotas, API key records</text>

  <rect class="box" x="50" y="1005" width="340" height="48" fill="#ffffff"/><text x="67" y="1034" class="node">Vector memory embeddings/index artifacts</text>
  <rect class="box" x="405" y="1005" width="350" height="48" fill="#ffffff"/><text x="422" y="1034" class="node">Report artifacts (PDF outputs + stress metadata)</text>
  <rect class="box" x="770" y="1005" width="330" height="48" fill="#ffffff"/><text x="787" y="1034" class="node">Extension telemetry + domain checks</text>
  <rect class="box" x="1115" y="1005" width="625" height="48" fill="#ffffff"/><text x="1132" y="1034" class="node">Operational counters/KPIs surfaced to dashboards (agents, telemetry volume, queue stats)</text>

  <!-- L7 -->
  <rect class="layer" x="30" y="1100" width="1740" height="180" fill="#fee2e2"/>
  <text x="48" y="1125" class="layerTitle">L7 — Runtime &amp; Execution Plane</text>
  <rect class="box" x="50" y="1140" width="420" height="52" fill="#ffffff"/><text x="67" y="1171" class="node">Docker services: frontend, backend, mongodb, wireguard, optional nginx</text>
  <rect class="box" x="485" y="1140" width="260" height="52" fill="#ffffff"/><text x="502" y="1171" class="node">WireGuard tunnel runtime (UDP 51820)</text>
  <rect class="box" x="760" y="1140" width="350" height="52" fill="#ffffff"/><text x="777" y="1171" class="node">Unified agent runtime + scanner modules</text>
  <rect class="box" x="1125" y="1140" width="285" height="52" fill="#ffffff"/><text x="1142" y="1171" class="node">Browser extension runtime</text>
  <rect class="box" x="1425" y="1140" width="315" height="52" fill="#ffffff"/><text x="1442" y="1171" class="node">Sandbox runtime jobs (Cuckoo integration)</text>

  <rect class="box" x="50" y="1202" width="1690" height="58" fill="#ffffff"/>
  <text x="68" y="1234" class="node">Execution plane drives telemetry ingress, action execution, and environment-level integrations used by the control and security layers.</text>

  <!-- L8 -->
  <rect class="layer" x="30" y="1295" width="1740" height="165" fill="#dcfce7"/>
  <text x="48" y="1320" class="layerTitle">L8 — External Integrations</text>
  <rect class="box" x="50" y="1335" width="260" height="48" fill="#ffffff"/><text x="66" y="1364" class="node">OpenAI-compatible APIs</text>
  <rect class="box" x="325" y="1335" width="280" height="48" fill="#ffffff"/><text x="342" y="1364" class="node">Emergent LLM path (optional)</text>
  <rect class="box" x="620" y="1335" width="220" height="48" fill="#ffffff"/><text x="637" y="1364" class="node">Slack webhook</text>
  <rect class="box" x="855" y="1335" width="320" height="48" fill="#ffffff"/><text x="872" y="1364" class="node">SMTP / SendGrid / Twilio</text>
  <rect class="box" x="1190" y="1335" width="300" height="48" fill="#ffffff"/><text x="1207" y="1364" class="node">Elasticsearch + Kibana</text>
  <rect class="box" x="1505" y="1335" width="235" height="48" fill="#ffffff"/><text x="1522" y="1364" class="node">Future enterprise sinks</text>

  <!-- connectors -->
  <line x1="1425" y1="190" x2="1425" y2="225" class="connector"/>
  <line x1="900" y1="390" x2="900" y2="405" class="connector"/>
  <line x1="900" y1="595" x2="900" y2="610" class="connector"/>
  <line x1="900" y1="890" x2="900" y2="905" class="connector"/>
  <line x1="900" y1="1085" x2="900" y2="1100" class="connector"/>
  <line x1="900" y1="1280" x2="900" y2="1295" class="connector"/>

  <line x1="340" y1="537" x2="340" y2="650" class="connector thin"/>
  <line x1="890" y1="537" x2="895" y2="650" class="connector thin"/>
  <line x1="1510" y1="537" x2="1460" y2="650" class="connector thin"/>

  <text x="40" y="1540" class="small">Generated architecture artifact: covers all major domains through v6.6 (test_iterations 1-30 + PRD evolution).</text>
</svg>
