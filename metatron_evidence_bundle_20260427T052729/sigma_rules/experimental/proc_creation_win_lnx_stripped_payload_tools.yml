title: Stripped Payload Tools Execution Windows
id: 6n0k1l9m-7i2j-2k5l-6m9n-0j3i4k7l2m3n
status: experimental
description: Detects execution of stripped binaries or tools, often used to reduce signature detection
references:
  - https://attack.mitre.org/techniques/T1027/008/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith:
      - '.exe'
      - '.dll'
    CommandLine|contains:
      - '--strip'
      - 'strip '
      - 'upx'
      - 'packer'
  condition: selection
falsepositives:
  - Legitimate software development tools
  - System administration
level: low
tags:
  - attack.defense_evasion
  - attack.t1027.008
