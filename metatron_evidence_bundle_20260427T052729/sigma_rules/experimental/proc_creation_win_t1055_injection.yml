title: Process Injection via DLL Injection
id: 9a3x4y2z-0v5w-5x8y-9z2a-3w6v7x0y5z6a
status: experimental
description: Detects DLL injection into running processes
references:
  - https://attack.mitre.org/techniques/T1055/003/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    CommandLine|contains|all:
      - 'inject'
      - '.dll'
  condition: selection
falsepositives:
  - Legitimate DLL injection tools
  - Debugging tools
level: high
tags:
  - attack.defense_evasion
  - attack.privilege_escalation
  - attack.t1055.003
