title: LNK Icon Smuggling UNC Path Execution
id: 2j6g7h5i-3e8f-8g1h-2i5j-6f9e0g3h8i9j
status: experimental
description: Detects LNK files with suspicious UNC paths in icon locations, often used for icon smuggling
references:
  - https://attack.mitre.org/techniques/T1027/012/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: file_event
  product: windows
detection:
  selection:
    EventType: Create
    TargetFilename|endswith: '.lnk'
    TargetFilename|contains:
      - '\\'
      - '@'
  filter:
    TargetFilename|contains:
      - 'C:\Windows\System32'
      - 'C:\Program Files'
  condition: selection and not filter
falsepositives:
  - Legitimate network shortcuts
  - Administrative LNK files
level: medium
tags:
  - attack.defense_evasion
  - attack.t1027.012
