title: Boot Autostart via Registry Run Keys
id: 9u3r4s2t-0p5q-5r8s-9t2u-3q6p7r0s5t6u
status: experimental
description: Detects modification of registry run keys for autostart
references:
  - https://attack.mitre.org/techniques/T1547/007/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    EventType: SetValue
    TargetObject|contains:
      - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Run'
      - '\SOFTWARE\Microsoft\Windows\CurrentVersion\RunOnce'
  condition: selection
falsepositives:
  - Legitimate software installation
level: medium
tags:
  - attack.persistence
  - attack.t1547.007
