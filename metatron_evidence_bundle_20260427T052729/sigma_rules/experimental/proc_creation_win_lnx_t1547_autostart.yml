title: Boot Autostart via Authentication Package
id: 1w5t6u4v-2r7s-7t0u-1v4w-5s8r9t2u7v8w
status: experimental
description: Detects modification of authentication packages for persistence
references:
  - https://attack.mitre.org/techniques/T1547/013/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    EventType: SetValue
    TargetObject|contains:
      - '\SYSTEM\CurrentControlSet\Control\Lsa'
      - 'Authentication Packages'
  condition: selection
falsepositives:
  - System configuration changes
level: high
tags:
  - attack.persistence
  - attack.t1547.013