title: Hijack Execution via DLL Search Order Hijacking
id: 2x6u7v5w-3s8t-8u1v-2w5x-6t9s0u3v8w9x
status: experimental
description: Detects DLL search order hijacking attempts
references:
  - https://attack.mitre.org/techniques/T1574/006/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: file_event
  product: windows
detection:
  selection:
    EventType: Create
    TargetFilename|endswith: '.dll'
    TargetFilename|contains:
      - 'system32'
      - 'syswow64'
  condition: selection
falsepositives:
  - Legitimate DLL installation
level: medium
tags:
  - attack.persistence
  - attack.privilege_escalation
  - attack.defense_evasion
  - attack.t1574.006
