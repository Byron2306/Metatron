title: Hijack Execution via Services Registry Permissions Weakness
id: 4z8w9x7y-5u0v-0w3x-4y7z-8v1u2w5x0y1z
status: experimental
description: Detects modification of service registry for execution hijacking
references:
  - https://attack.mitre.org/techniques/T1574/013/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: registry_set
  product: windows
detection:
  selection:
    EventType: SetValue
    TargetObject|contains:
      - '\SYSTEM\CurrentControlSet\Services'
      - 'ImagePath'
