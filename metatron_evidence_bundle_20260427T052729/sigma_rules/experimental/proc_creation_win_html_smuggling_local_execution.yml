title: HTML Smuggling Local Execution
id: 8f2c3d1e-9a4b-4c7d-8e1f-2b5a6c9d3e4f
status: experimental
description: Detects execution of HTML files that may contain smuggled payloads, often used for defense evasion
references:
  - https://attack.mitre.org/techniques/T1027/006/
  - https://www.mdsec.co.uk/2020/08/exploiting-arbitrary-file-writes-with-html-smuggling/
author: Seraph AI (experimental)
date: 2026-04-20
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    Image|endswith: '\mshta.exe'
    CommandLine|contains|all:
      - 'javascript:'
      - 'ActiveXObject'
  condition: selection
falsepositives:
  - Legitimate use of MSHTA for HTML applications
  - Administrative scripts
level: medium
tags:
  - attack.defense_evasion
  - attack.t1027.006