title: Masquerading - Double File Extension Executable
id: b8c9d0e1-f2a3-4567-bcde-567890123456
status: experimental
description: |
    Detects execution of files with double extensions where the real extension is
    an executable type (T1036.007 / T1036.009). Adversaries name files like
    "invoice.pdf.exe" or "document.docx.bat" to trick users who have file extensions
    hidden. The file appears to be a document but executes as a binary. Commonly
    used in phishing campaigns with compressed archives.
references:
    - https://attack.mitre.org/techniques/T1036/009/
    - https://attack.mitre.org/techniques/T1036/007/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1036.009
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|re: '(?i)\.(pdf|doc|docx|xls|xlsx|ppt|pptx|txt|jpg|png|zip|rar)\.(exe|bat|cmd|ps1|vbs|js|hta|scr|pif|com)$'
    condition: selection
falsepositives:
    - None expected — legitimate software does not use double executable extensions
level: high
---
title: Masquerading - Executable Renamed to Match System Binary Name in Non-System Path
id: c9d0e1f2-a3b4-5678-cdef-678901234567
status: experimental
description: |
    Detects processes whose binary name matches a known Windows system binary but
    is executing from an unexpected path (T1036.010). Adversaries copy malware and
    name it "svchost.exe", "explorer.exe", or "lsass.exe" but execute it from
    user-writable paths to avoid suspicion. The image name looks legitimate but
    the path reveals the masquerade.
references:
    - https://attack.mitre.org/techniques/T1036/010/
    - https://attack.mitre.org/techniques/T1036/005/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1036.010
logsource:
    category: process_creation
    product: windows
detection:
    selection_system_binary_names:
        Image|endswith:
            - '\svchost.exe'
            - '\lsass.exe'
            - '\services.exe'
            - '\winlogon.exe'
            - '\csrss.exe'
            - '\smss.exe'
            - '\wininit.exe'
            - '\spoolsv.exe'
            - '\taskhost.exe'
            - '\taskhostw.exe'
    filter_legit_paths:
        Image|startswith:
            - 'C:\Windows\System32\'
            - 'C:\Windows\SysWOW64\'
            - 'C:\Windows\WinSxS\'
    condition: selection_system_binary_names and not filter_legit_paths
falsepositives:
    - Security tools that rename themselves for testing
level: critical
---
title: Masquerading - Right-to-Left Override Character in Filename
id: d0e1f2a3-b4c5-6789-defa-789012345678
status: experimental
description: |
    Detects processes or file creation events where the filename contains a
    Right-to-Left Override (RTLO) Unicode character (U+202E). This character
    reverses displayed text direction, allowing a file named "invoice_U+202Egpj.exe"
    to display as "invoice_exe.jpg" — a classic social engineering technique.
    This is T1036.011 and has been used in targeted phishing attacks.
references:
    - https://attack.mitre.org/techniques/T1036/011/
    - https://unicode.org/reports/tr9/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1036.011
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|contains: "\u202e"
    condition: selection
falsepositives:
    - None expected in legitimate software
level: critical
---
title: Masquerading - Executable Compiled with Misleading Internal Name
id: e1f2a3b4-c5d6-7890-efab-890123456789
status: experimental
description: |
    Detects PE files executing where the OriginalFileName (from version resource)
    does not match the file on disk. Adversaries use T1036.012 to compile malware
    with a benign-looking OriginalFileName metadata field, making it appear to be
    a legitimate tool in process listings and security products that check version
    resources rather than image path. The mismatch between disk name and internal
    name is the key indicator.
references:
    - https://attack.mitre.org/techniques/T1036/012/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1036.012
logsource:
    category: process_creation
    product: windows
detection:
    selection_mismatch:
        OriginalFileName|endswith:
            - 'svchost.exe'
            - 'explorer.exe'
            - 'chrome.exe'
            - 'firefox.exe'
            - 'outlook.exe'
            - 'powershell.exe'
    filter_legit:
        Image|endswith:
            - '\svchost.exe'
            - '\explorer.exe'
            - '\chrome.exe'
            - '\firefox.exe'
            - '\OUTLOOK.EXE'
            - '\powershell.exe'
    condition: selection_mismatch and not filter_legit
falsepositives:
    - Renamed portable executables used by IT admins
level: high
