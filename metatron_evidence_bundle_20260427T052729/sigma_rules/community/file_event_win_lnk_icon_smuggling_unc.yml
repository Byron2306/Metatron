title: LNK Icon Smuggling - Shortcut with External UNC or URL Icon Path
id: 09165ac7-d7da-4f89-adc7-4b789fe9f28e
status: experimental
description: |
    Detects creation of Windows shortcut (LNK) files with an icon path pointing to
    a UNC share, WebDAV path, or external URL. Adversaries abuse the IconEnvironmentDataBlock
    in LNK files to trigger outbound connections when Windows Explorer previews the
    parent folder, enabling credential harvesting (NTLMv2 via UNC) or payload staging.
    This technique (T1027.012) is used in spearphishing and supply chain attacks.
references:
    - https://attack.mitre.org/techniques/T1027/012/
    - https://www.outflank.nl/blog/2023/03/28/smuggling-files-through-lnk-metadata/
    - https://github.com/AmnesiacSecurity/LNKStealer
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.credential_access
    - attack.t1027.012
    - attack.t1187
logsource:
    category: file_event
    product: windows
detection:
    selection_lnk:
        TargetFilename|endswith: '.lnk'
    selection_lnk_location:
        TargetFilename|contains:
            - '\Desktop\'
            - '\Downloads\'
            - '\AppData\Roaming\Microsoft\Windows\Recent\'
            - '\Startup\'
    condition: selection_lnk and selection_lnk_location
falsepositives:
    - Legitimate shortcut creation by installers
level: low
