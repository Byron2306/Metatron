title: Proxy Execution via InstallUtil.exe Loading Serialized Payload
id: d3e4f5a6-7b8c-9d0e-1f2g-3h4i5j6k7l8m
status: experimental
description: |
    Detects InstallUtil.exe being invoked with command-line arguments or from
    suspicious parent processes in a way consistent with proxy execution (T1218.004).
    InstallUtil.exe is a .NET binary that runs installer components — adversaries
    use it to execute arbitrary .NET assemblies by embedding malicious installer
    classes that run during the install/uninstall phase. Commonly used in
    AppLocker and WDAC bypasses.
references:
    - https://attack.mitre.org/techniques/T1218/004/
    - https://lolbas-project.github.io/lolbas/Binaries/Installutil/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1218.004
logsource:
    category: process_creation
    product: windows
detection:
    selection_installutil:
        Image|endswith: '\InstallUtil.exe'
    filter_legit_parent:
        ParentImage|endswith:
            - '\msiexec.exe'
            - '\setup.exe'
            - '\install.exe'
        CurrentDirectory|contains: '\Program Files'
    selection_suspicious:
        CommandLine|contains:
            - '/logfile='
            - '/LogToConsole='
            - '/U '
            - '/uninstall'
        CommandLine|re: '(?i)(temp|appdata|users\\public|downloads|desktop)'
    condition: selection_installutil and (selection_suspicious or not filter_legit_parent)
falsepositives:
    - Legitimate .NET component installation during software setup
level: medium
