title: Proxy Execution via Mavinject.exe Code Injection
id: c2f3a4b5-6d7e-4f8g-9h1i-2j3k4l5m6n7o
status: experimental
description: |
    Detects mavinject.exe being used to inject a DLL into a running process.
    Mavinject.exe is a signed Microsoft binary used by App-V that accepts a PID
    and DLL path on the command line, performing DLL injection. Adversaries use it
    (T1218.015) to inject malicious code into legitimate processes, bypassing
    application whitelisting and evading detection since the injection comes from
    a trusted signed binary.
references:
    - https://attack.mitre.org/techniques/T1218/015/
    - https://lolbas-project.github.io/lolbas/Binaries/Mavinject/
    - https://posts.specterops.io/mavinject-exe-functionality-deconstructed-c29ab2cf5c0e
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.defense_evasion
    - attack.t1218.015
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\mavinject.exe'
        CommandLine|contains: '/INJECTRUNNING'
    condition: selection
falsepositives:
    - Legitimate App-V application virtualization (rare in modern environments)
level: high
