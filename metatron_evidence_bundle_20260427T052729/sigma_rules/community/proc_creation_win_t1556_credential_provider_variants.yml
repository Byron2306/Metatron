title: Credential Access - Password Filter DLL Registration for Plaintext Harvesting
id: a1b2c3d4-e5f6-7890-abcd-890123456789
status: experimental
description: |
    Detects registration of a custom Password Filter DLL (T1556.003). Password filters
    are DLLs registered in LSASS that receive all new passwords in plaintext when users
    change them. Adversaries register a malicious filter to harvest credentials across
    the domain with a single DLL placed on domain controllers.
references:
    - https://attack.mitre.org/techniques/T1556/003/
    - https://clymb3r.wordpress.com/2013/09/15/intercepting-password-changes-with-function-hooking/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.credential_access
    - attack.persistence
    - attack.t1556.003
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject: 'HKLM\SYSTEM\CurrentControlSet\Control\Lsa\Notification Packages'
    filter_known:
        Details|contains:
            - 'rassfm'
            - 'scecli'
            - 'acctres'
    condition: selection and not filter_known
falsepositives:
    - Third-party password complexity enforcement tools
    - Enterprise PAM solutions (CyberArk, BeyondTrust)
level: high
