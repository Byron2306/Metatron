title: Credential Access - Network Provider DLL Manipulation for Credential Interception
id: b2c3d4e5-f6a7-8901-bcde-901234567890
status: experimental
description: |
    Detects registration of a custom Network Provider DLL (T1556.008). Network providers
    handle authentication for network resource access. A malicious provider receives
    credentials when users connect to network shares. This technique (used by the
    KeeFarce and similar tools) is stealthy because Network Provider DLLs load during
    normal logon and network authentication without special privileges.
references:
    - https://attack.mitre.org/techniques/T1556/008/
    - https://attack.mitre.org/techniques/T1556/009/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.credential_access
    - attack.t1556.008
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|contains: '\SYSTEM\CurrentControlSet\Services\'
        TargetObject|endswith:
            - '\NetworkProvider\Name'
            - '\NetworkProvider\ProviderPath'
    filter_known_providers:
        Details|contains:
            - 'ntlanman'
            - 'RDPNP'
            - 'webclient'
            - 'LanmanWorkstation'
    condition: selection and not filter_known_providers
falsepositives:
    - Legitimate VPN or network authentication software installing providers
level: high
