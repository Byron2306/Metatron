title: Credential Access - Rogue Credential Provider DLL Registration
id: f0a1b2c3-d4e5-6789-fabc-789012345678
status: experimental
description: |
    Detects registration of a custom Windows Credential Provider DLL in the registry
    (T1556.007). Credential Providers are loaded by winlogon.exe at logon and handle
    authentication UI. Adversaries register malicious Credential Provider DLLs to
    capture plaintext credentials as users log in. The DLL runs in SYSTEM context
    within the logon process — a privileged and persistent position.
references:
    - https://attack.mitre.org/techniques/T1556/007/
    - https://pentestlab.blog/2020/02/12/credential-provider/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.credential_access
    - attack.persistence
    - attack.t1556.007
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|contains:
            - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Authentication\Credential Providers\'
            - '\SOFTWARE\Microsoft\Windows\CurrentVersion\Authentication\Plap Providers\'
    filter_known_providers:
        Details|contains:
            - '{60b78e88-ead8-445c-9cfd-0b87f74ea6cd}'
            - '{6f45dc1e-5384-457a-bc13-2cd81b0d28ed}'
            - '{F8A0B131-5F68-486c-8600-C2F30E8A2C84}'
    condition: selection and not filter_known_providers
falsepositives:
    - Third-party SSO and smartcard credential provider software (CyberArk, Duo, etc.)
level: high
