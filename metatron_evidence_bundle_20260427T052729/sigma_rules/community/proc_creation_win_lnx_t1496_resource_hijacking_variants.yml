title: Resource Hijacking - GPU Resource Abuse via CUDA/OpenCL in Suspicious Process
id: e7f8a9b0-c1d2-3456-efab-456789012345
status: experimental
description: |
    Detects processes loading CUDA or OpenCL libraries from non-standard paths or
    from processes that should not be using GPU compute (T1496.003). Adversaries
    compile GPU-accelerated miners and inject them into long-running processes to
    abuse GPU resources while hiding the mining workload behind a legitimate process.
references:
    - https://attack.mitre.org/techniques/T1496/003/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.impact
    - attack.t1496.003
logsource:
    category: image_load
    product: windows
detection:
    selection_cuda_nonstandard:
        ImageLoaded|contains:
            - 'nvcuda.dll'
            - 'nvopencl.dll'
            - 'OpenCL.dll'
        Image|endswith:
            - '\cmd.exe'
            - '\powershell.exe'
            - '\wscript.exe'
            - '\cscript.exe'
            - '\mshta.exe'
            - '\rundll32.exe'
    condition: selection_cuda_nonstandard
falsepositives:
    - Legitimate GPGPU tools launched from command line
level: medium
