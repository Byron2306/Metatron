title: Resource Hijacking - Cryptominer Execution via Common Miner Binaries
id: c5d6e7f8-a9b0-1234-cdef-234567890123
status: experimental
description: |
    Detects execution of known cryptomining binaries or mining pool connection
    patterns (T1496.001). Adversaries compromise systems to run cryptocurrency miners,
    consuming CPU/GPU resources. XMRig is the most common tool; pool connections
    use stratum+tcp protocol. Also detects miners disguised with common process names.
references:
    - https://attack.mitre.org/techniques/T1496/001/
    - https://github.com/xmrig/xmrig
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.impact
    - attack.t1496.001
logsource:
    category: process_creation
    product: windows
detection:
    selection_miner_binary:
        Image|endswith:
            - '\xmrig.exe'
            - '\xmrig-cuda.exe'
            - '\xmrig-opencl.exe'
            - '\nbminer.exe'
            - '\t-rex.exe'
            - '\PhoenixMiner.exe'
            - '\ethminer.exe'
    selection_pool_args:
        CommandLine|contains:
            - 'stratum+tcp://'
            - 'stratum+ssl://'
            - '--pool '
            - '-o pool.'
            - 'mining.pool'
            - 'moneropool'
            - 'xmrpool'
    condition: 1 of selection_*
falsepositives:
    - Intentional cryptocurrency mining (clearly authorized environments only)
level: high
