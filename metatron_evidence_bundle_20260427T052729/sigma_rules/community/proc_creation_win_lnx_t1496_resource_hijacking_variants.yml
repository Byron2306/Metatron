title: Resource Hijacking - Cloud Compute Instance Spin-Up via CLI After Credential Access
id: d6e7f8a9-b0c1-2345-defa-345678901234
status: experimental
description: |
    Detects cloud provider CLI tools being used to create/start compute instances
    in patterns consistent with resource hijacking for cryptomining (T1496.002).
    Adversaries who steal cloud credentials (T1552.005) quickly spin up GPU/high-CPU
    instances in regions they don't normally use. Key indicators: unusual region,
    large instance type, and instance creation outside business hours.
references:
    - https://attack.mitre.org/techniques/T1496/002/
    - https://unit42.paloaltonetworks.com/cloud-lateral-movement-cryptomining/
author: Byron (Seraph AI Defense Platform)
date: 2026/04/20
tags:
    - attack.impact
    - attack.t1496.002
logsource:
    category: process_creation
    product: linux
detection:
    selection_aws_create:
        Image|endswith:
            - '/aws'
            - '/aws2'
        CommandLine|contains:
            - 'run-instances'
            - 'start-instances'
        CommandLine|re: '(?i)(p2\.|p3\.|p4\.|g4\.|g5\.|c5n\.|hpc)'
    selection_gcp_create:
        Image|endswith: '/gcloud'
        CommandLine|contains:
            - 'compute instances create'
            - 'compute instances start'
    selection_azure_create:
        Image|endswith:
            - '/az'
            - '/azure-cli'
        CommandLine|contains:
            - 'vm create'
            - 'vm start'
    condition: 1 of selection_*
falsepositives:
    - Legitimate cloud infrastructure provisioning by DevOps teams
    - CI/CD pipelines spinning up compute for builds
level: medium
